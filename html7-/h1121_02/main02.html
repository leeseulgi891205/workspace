<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <title>관광가이드</title>
    <style>
        table,th,td{border:1px solid black; border-collapse: collapse;}
        table{width:1200px;}
        th,td{height:40px; text-align: center; }
        img{width:200px; height: 200px;}
        button{margin-top: 10px; margin-right: 10px; display: flex;}
    </style>
    <script>
        $(function(){
            $("#takeBtn").click(function(){
                $.ajax({
                    url:"https://apis.data.go.kr/B551011/PhotoGalleryService1/gallerySyncDetailList1?serviceKey=ecb80e54dc236479944365dc1746fd3924546fa7204901e9f7a12bba500d63d4&numOfRows=10&pageNo=1&MobileOS=ETC&MobileApp=AppTest&showflag=1&_type=json&title=%EC%B2%AD%EC%84%A4%EB%AA%A8",
                    type:"get",
                    data:{},
                    dataType:"json",
                    success:function(data){
                        alert("성공했습니다.");
                        console.log(data.response.body.items.item);  
                        var tour_data = data.response.body.items.item;
                        var dataHtml = ``;
                        for(var i=0;i<tour_data.length;i++){
                            dataHtml += `
                                <tr id="${tour_data[i].galContentId}">
                                    <td>${tour_data[i].galContentId}</td>
                                    <td>${tour_data[i].galTitle}</td>
                                    <td>${tour_data[i].galCreatedtime}</td>
                                    <td>${tour_data[i].galPhotographyLocation}</td>
                                    <td>${tour_data[i].galPhotographer}</td>
                                    <td>${tour_data[i].galSearchKeyword}</td>
                                    <td><img src="${tour_data[i].galWebImageUrl}"></td>
                                   
                                </tr>
                            `;
                        }
                        $("#tbody").html(dataHtml);
                    },
                    error:function(){ alert("실패했습니다.");  }
                });//ajax
            });//takeBtn
        });//jquery

        // 수정 삭제 버튼 구현
            $(function(){
                $("#addBtn").click(function(){
                    var sno = $("#sno").val();
                    var name = $("#name").val();
                    var kor = $("#kor").val();
                    var eng = $("#eng").val();
                    var math = $("#math").val();
                    var soc = $("#soc").val();
                    var img = $("#img").val();
    
                    // 수정 로직 구현
                    $("#" + sno).html(`
                        <td>${sno}</td>
                        <td>${name}</td>
                        <td>${kor}</td>
                        <td>${eng}</td>
                        <td>${math}</td>
                        <td>${soc}</td>
                        <td><img src="${img}"></td>
                    `);
                }); //addBtn
    
                $("#deleteBtn").click(function(){
                    var sno = $("#sno").val();
                    $("#" + sno).remove();
                }); //deleteBtn
            }); //jquery
    </script>
</head>
<body>
    <button type="button" id="takeBtn">데이터 가져오기</button>
    <form action="#" method="get">
        <label>번호</label>
        <input type="text" id="sno" name="sno"><br>
        <label>제목</label>
        <input type="text" id="name" name="name"><br>
        <label>촬영일</label>
        <input type="text" id="kor" name="kor"><br>
        <label>촬영지역</label>
        <input type="text" id="eng" name="eng"><br>
        <label>작가</label>
        <input type="text" id="math" name="math" onkeyup="enterBtn(event)" ><br>
        <label>키워드</label>
        <input type="text" id="soc" name="soc"><br>
        <label>이미지</label>
        <input type="text" id="img" name="img"><br>
        <button type="button" id="addBtn">수정</button>
        <button type="button" id="addBtn">삭제</button>
    </form>
    <table>
        <tr>
            <th>번호</th>
            <th>제목</th>
            <th>촬영일</th>
            <th>촬영장소</th>
            <th>작가</th>
            <th>키워드</th>
            <th>이미지</th>
        </tr>
        <tbody id="tbody">
           
            
        </tbody>

    </table>
   
   
</body>
</html>
