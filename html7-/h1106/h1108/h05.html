<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리솜포레스트 회원가입</title>
    <style>
        
        @import url('https://fonts.googleapis.com/css2?family=Gothic+A1&display=swap');
        *{padding: 0; margin: 0; color: #333;}
        div{width: 600px; margin: 0 auto; }
        h3{   font-family: "Gothic A1", sans-serif; font-weight: 400; font-style: normal; font-size: 40px; text-align: center; color: #333;margin-top: 40px; margin-bottom: 15px;}
        h4{font-size: 22px; font-weight: 500; margin-top: 70px;
            margin-bottom: 30px;
        }
        span{font-size: 16px; color: #96694c;}
        ul{list-style: none; text-align: center;
            display: flex;justify-content: space-between;}
        li{width: 130px; height: 57px; border: 1px solid #ddd;
            line-height: 55px; font-size: 16px;
            cursor: pointer;
        }
        li:hover{
            border-color: #96694c;
        }
        li:active{
            border: 1px solid #96694c;
        }
        .form-group{margin-top: 30px;}
        .form-group label{display: block; font-size: 15px; font-weight: 500; margin-bottom: 8px;}
        .form-group label .required{color: #96694c;}
        .form-group input[type="text"], .form-group input[type="password"]{
            width: 100%; height: 40px; border: 1px solid #ddd;
            border-radius: 4px; padding: 0 10px; font-size: 14px;
            box-sizing: border-box;
        }
        .help-text{font-size: 13px; color: black; margin-top: 5px;}
        .help-text span{color: black;}
        .help-text .special-chars{color: #96694c !important;}
    </style>
</head>
<body>
    <div>
        <h3>회원가입</h3>
        <h4>회원정보<span>(*필수입력)</span></h4>
        <ul>
            <li>분양</li>
            <li>사이버</li>
            <li>임직원</li>
            <li>NOU</li>
        </ul>

        <div class="form-group">
            <label for="userid"><span class="required">*</span> 아이디</label>
            <input type="text" id="userid" name="userid">
            <div class="help-text">- 4-16자리의 영문 소문자, 숫자, 특수기호(_)만 사용</div>
            <div class="help-text">- 첫 글자는 영문으로 입력</div>
        </div>

        <div class="form-group">
            <label for="password"><span class="required">*</span> 비밀번호</label>
            <input type="password" id="password" name="password">
            <div class="help-text">- 최소 10글자 이상 소문자, 대문자, 숫자, 특수문자를 포함해야 합니다.</div>
            <div class="help-text">- 가능한 특수문자 : <span class="special-chars">()[]?.;:)(*_!^~+<>@#$%&=</span></div>
        </div>

        <div class="form-group">
            <label for="password_confirm"><span class="required">*</span> 비밀번호 확인</label>
            <input type="password" id="password_confirm" name="password_confirm">
        </div>
        
    </div>

</body>
</html>
