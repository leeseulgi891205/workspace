<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SQL 빈칸 객관식 연습</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 16px;
            line-height: 1.6;
        }
        h1 { text-align: center; }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }

        .question {
            font-weight: bold;
            margin-bottom: 12px;
            white-space: pre-wrap;
            font-family: Consolas, "Courier New", monospace;
        }

        .choice { margin-bottom: 10px; }

        .choice button {
            width: 100%;
            text-align: left;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            cursor: pointer;
            background-color: #f9f9f9;
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
            white-space: pre-wrap;
        }

        .choice button:hover { background-color: #efefef; }

        #result { margin-top: 12px; font-weight: bold; }

        #shuffleBtn {
            margin-top: 12px;
            padding: 6px 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>SQL 보기형 (빈칸 채우기)</h1>

    <div class="card">
        <div class="question" id="questionText">
select *
from (   ❗여기에 들어갈 SQL은?   )
where rnum between 11 and 20;
        </div>

        <div id="choicesContainer"></div>

        <div id="result"></div>
        <button id="shuffleBtn">보기 다시 섞기</button>
    </div>

    <script>
        // 정답 + 오답 보기
        const choices = [
            {
                // ✔ 정답
                text: `select row_number() over(order by bno asc) rnum, a.* 
from board2 a`,
                correct: true
            },
            {
                // ❌ 오답1: rownum 잘못 사용
                text: `select rownum rnum, a.*
from board2 a
order by bno asc`,
                correct: false
            },
            {
                // ❌ 오답2: order by 위치 틀림
                text: `select a.*, row_number() over(order by rnum) rnum
from board2 a`,
                correct: false
            },
            {
                // ❌ 오답3: asc 빠짐 + 컬럼 누락
                text: `select row_number() over(order by bno) rnum
from board2`,
                correct: false
            }
        ];

        const choicesContainerEl = document.getElementById("choicesContainer");
        const resultEl = document.getElementById("result");
        const shuffleBtn = document.getElementById("shuffleBtn");

        // 배열 랜덤 섞기
        function shuffleArray(array) {
            const arr = array.slice();
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 보기 렌더링
        function renderChoices() {
            resultEl.textContent = "";
            const shuffled = shuffleArray(choices);
            choicesContainerEl.innerHTML = "";

            shuffled.forEach((choice, idx) => {
                const div = document.createElement("div");
                div.className = "choice";

                const btn = document.createElement("button");
                btn.textContent = `${idx + 1}.  ${choice.text}`;
                btn.addEventListener("click", function () {
                    checkAnswer(choice.correct);
                });

                div.appendChild(btn);
                choicesContainerEl.appendChild(div);
            });
        }

        // 정답 체크
        function checkAnswer(correct) {
            if (correct) {
                resultEl.textContent = "✅ 정답! row_number()를 안쪽에서 정렬 후 번호 매긴 게 맞아.";
                resultEl.style.color = "green";
            } else {
                resultEl.textContent = "❌ 오답! row_number() over(order by bno asc) 구조를 기억해봐.";
                resultEl.style.color = "red";
            }
        }

        shuffleBtn.addEventListener("click", renderChoices);

        renderChoices(); // 첫 렌더링
    </script>
</body>
</html>
