$spring.application.name=s0304_05
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Port Setting #
server.port = 8181

#-----------------------------------------------------------------
# Oracle DB Setting #
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/xe
spring.datasource.username=ora_user3
spring.datasource.password=1111

# MySQL DB Setting #
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.url=jdbc:mysql://localhost:3306/shop?serverTimezone=Asia/Seoul
#spring.datasource.username=ora_user3
#spring.datasource.password=1111

#-----------------------------------------------------------------
# File Upload Size - per file, total request
spring.servlet.multipart.maxFileSize=10MB
spring.servlet.multipart.maxRequestSize=20MB

#-----------------------------------------------------------------
# JPA Entity Naming and Hibernate Configuration
spring.jpa.open-in-view=true
# Automatically generate DDL: create, update, none - column names created in alphabetical order
spring.jpa.hibernate.ddl-auto=update
# Use entity, DB naming as is
# org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# JPA Numbering - Oracle Sequence Setting
spring.jpa.hibernate.use-new-id-generator-mappings=false
# Show SQL statements - formatted output
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Oracle Dialect Configuration
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.Oracle10gDialect
