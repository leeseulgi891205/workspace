<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>댓글 테스트</title>
    <style>
        body {font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 30px auto;}

        h1 {text-align: center;}

        .comment-form {border: 1px solid #ddd;
             padding: 15px; border-radius: 8px;
              margin-bottom: 20px;}

        .comment-form input,.comment-form textarea {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            padding: 8px;}

        .comment-form button {
            padding: 8px 16px;
            cursor: pointer;}

        .comment-list {border-top: 1px solid #ddd;
            padding-top: 15px;}

        .comment-item {border-bottom: 1px solid #eee;
            padding: 10px 0;}

        .comment-meta {font-size: 12px;
            color: #666;
            margin-bottom: 5px;}

        .comment-content {white-space: pre-wrap; /* 줄바꿈 유지 */}
    </style>
</head>
<body>

<h1>댓글 남기기</h1>

<div class="comment-form">
    <input type="text" id="username" placeholder="닉네임을 입력하세요">
    <textarea id="commentText" rows="4" placeholder="댓글을 입력하세요"></textarea>
    <button id="addCommentBtn">댓글 등록</button>
</div>

<h2>댓글 목록</h2>
<div id="commentList" class="comment-list">

</div>

<script>
    const addCommentBtn = document.getElementById("addCommentBtn");
    const usernameInput = document.getElementById("username");
    const commentTextInput = document.getElementById("commentText");
    const commentList = document.getElementById("commentList");

    addCommentBtn.addEventListener("click", function () {
        const username = usernameInput.value.trim();
        const commentText = commentTextInput.value.trim();

        if (!username) {
            alert("닉네임을 입력해 주세요!");
            return;
        }

        if (!commentText) {
            alert("댓글 내용을 입력해 주세요!");
            return;
        }

        // 댓글 박스 하나 만들기
        const commentItem = document.createElement("div");
        commentItem.className = "comment-item";

        // 시간 찍기
        const now = new Date();
        const timeString = now.toLocaleString(); // 브라우저 기준 날짜/시간

        commentItem.innerHTML = `
            <div class="comment-meta">
                <strong>${username}</strong> | <span>${timeString}</span>
            </div>
            <div class="comment-content">${commentText}</div>
        `;

        // 목록에 추가
        commentList.prepend(commentItem);

        // 입력창 초기화
        commentTextInput.value = "";});
</script>

</body>
</html>
