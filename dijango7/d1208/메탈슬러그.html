<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Run & Gun (Metal Slug-ish)</title>
  <style>
    html, body { margin:0; height:100%; background:#0b1020; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", sans-serif; }
    .wrap { display:flex; flex-direction:column; height:100%; }
    .hud {
      color:#d6e3ff; padding:10px 12px; display:flex; gap:14px; align-items:center;
      background: linear-gradient(to bottom, rgba(255,255,255,.06), rgba(255,255,255,0));
      border-bottom: 1px solid rgba(255,255,255,.08);
      user-select:none;
      flex-wrap: wrap;
    }
    .hud b { color:#fff; }
    .hint { opacity:.85; font-size:13px; }
    canvas { width:100%; height:100%; display:block; background: linear-gradient(#8fd3ff 0%, #d8f2ff 55%, #f5fbff 100%); }
    .panel {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      background: rgba(0,0,0,.45); color:#fff; text-align:center; padding:20px; backdrop-filter: blur(4px);
    }
    .card {
      background: rgba(10,14,30,.92); border:1px solid rgba(255,255,255,.12);
      border-radius: 16px; padding:18px 16px; max-width:560px;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
    }
    .card h1 { font-size:20px; margin:0 0 8px; }
    .card p { margin:6px 0; opacity:.92; }
    .btn {
      display:inline-block; margin-top:10px; padding:10px 14px; border-radius:12px;
      background:#2e6bff; color:#fff; border:0; cursor:pointer; font-weight:800;
    }
    .btn:active { transform: translateY(1px); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <div>HP: <b id="hp">5</b></div>
    <div>점수: <b id="score">0</b></div>
    <div>탄약: <b id="ammo">∞</b></div>
    <div>수류탄: <b id="gren">3</b></div>
    <div>시간: <b id="time">0.0</b>s</div>
    <div class="hint">← → 이동 / ↑ 점프 / Z 사격 / X 수류탄 / R 리셋</div>
  </div>

  <div style="position:relative; flex:1;">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="panel" class="panel">
      <div class="card">
        <h1>Mini Run & Gun 🔫</h1>
        <p>적을 쏘고( Z ), 수류탄( X )을 던져서 전진해!</p>
        <p style="opacity:.75">*원작 재현이 아니라 “메탈슬러그풍” 미니 게임.</p>
        <button class="btn" id="startBtn">시작</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const uiHp = document.getElementById("hp");
  const uiScore = document.getElementById("score");
  const uiGren = document.getElementById("gren");
  const uiTime = document.getElementById("time");
  const panel = document.getElementById("panel");
  const startBtn = document.getElementById("startBtn");

  const W = canvas.width, H = canvas.height;

  // ===== Helpers =====
  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
  const aabb = (a,b)=> a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  const nowSec = () => performance.now()/1000;

  // ===== Input =====
  let keys = new Set();
  window.addEventListener("keydown", (e)=>{
    if (["ArrowLeft","ArrowRight","ArrowUp","KeyZ","KeyX","KeyR"].includes(e.code)) e.preventDefault();
    keys.add(e.code);
    if (e.code==="KeyR") hardReset(true);
  });
  window.addEventListener("keyup",(e)=>keys.delete(e.code));

  function showPanel(html){ panel.innerHTML = html; panel.style.display="flex"; }
  function hidePanel(){ panel.style.display="none"; }

  // ===== Game constants =====
  const GRAV = 2200;
  const MOVE = 480;
  const JUMP = 900;
  const GROUND_Y = H - 70;

  // World
  const world = {
    width: 4200,
    camX: 0,
    // Some cover blocks / platforms
    blocks: [
      {x:520,y:GROUND_Y-60,w:120,h:60},
      {x:980,y:GROUND_Y-110,w:150,h:110},
      {x:1420,y:GROUND_Y-80,w:120,h:80},
      {x:1750,y:GROUND_Y-140,w:160,h:140},
      {x:2300,y:GROUND_Y-90,w:140,h:90},
      {x:2750,y:GROUND_Y-130,w:180,h:130},
      {x:3250,y:GROUND_Y-80,w:160,h:80},
    ],
    goal: {x: 4040, y: GROUND_Y-140, w: 40, h: 140}
  };

  // Player
  const player = {
    x: 80, y: GROUND_Y-48, w: 34, h: 48,
    vx: 0, vy: 0,
    onGround: false,
    facing: 1,
    hp: 5,
    inv: 0,
    shootCD: 0,
    grenCD: 0,
    gren: 3,
  };

  // Entities
  let bullets = [];
  let grenades = [];
  let enemies = [];
  let particles = [];
  let score = 0;

  // Timing
  let running = false;
  let last = 0;
  let elapsed = 0;

  function seedEnemies(){
    enemies = [
      mkEnemy(760,  GROUND_Y-44, "grunt"),
      mkEnemy(1180, GROUND_Y-44, "grunt"),
      mkEnemy(1600, GROUND_Y-44, "grunt"),
      mkEnemy(2100, GROUND_Y-44, "grunt"),
      mkEnemy(2500, GROUND_Y-44, "grunt"),
      mkEnemy(2920, GROUND_Y-44, "grunt"),
      mkEnemy(3500, GROUND_Y-44, "grunt"),
      mkEnemy(3880, GROUND_Y-44, "heavy"),
    ];
  }
  function mkEnemy(x,y,type){
    const heavy = type==="heavy";
    return {
      x, y, w: heavy?44:34, h: heavy?52:44,
      vx: heavy? -50 : -80,
      vy: 0,
      hp: heavy? 6 : 3,
      type,
      alive:true,
      hit:0,
      shootCD: heavy? 0.8 : 1.2, // time until next shot attempt
    };
  }

  function resetState(){
    player.x=80; player.y=GROUND_Y-48;
    player.vx=0; player.vy=0;
    player.onGround=false; player.facing=1;
    player.hp=5; player.inv=0;
    player.shootCD=0; player.grenCD=0;
    player.gren=3;
    bullets=[]; grenades=[]; particles=[];
    score=0;
    world.camX=0;
    elapsed=0;
    seedEnemies();
    syncHUD();
  }

  function hardReset(startRun){
    resetState();
    hidePanel();
    running = !!startRun;
    last = performance.now();
    if (running) requestAnimationFrame(loop);
  }

  function syncHUD(){
    uiHp.textContent = String(player.hp);
    uiScore.textContent = String(score);
    uiGren.textContent = String(player.gren);
    uiTime.textContent = elapsed.toFixed(1);
  }

  // ===== Physics helpers =====
  function resolveBlocks(ent){
    // ground
    if (ent.y + ent.h >= GROUND_Y) {
      ent.y = GROUND_Y - ent.h;
      ent.vy = 0;
      ent.onGround = true;
    }

    // blocks collision (AABB axis separation; simple)
    for (const b of world.blocks){
      if (!aabb(ent,b)) continue;

      const ox1 = (ent.x + ent.w) - b.x;
      const ox2 = (b.x + b.w) - ent.x;
      const oy1 = (ent.y + ent.h) - b.y;
      const oy2 = (b.y + b.h) - ent.y;

      const minX = Math.min(ox1, ox2);
      const minY = Math.min(oy1, oy2);

      if (minX < minY) {
        // resolve X
        if (ox1 < ox2) ent.x = b.x - ent.w;
        else ent.x = b.x + b.w;
        ent.vx = 0;
      } else {
        // resolve Y
        if (oy1 < oy2) {
          ent.y = b.y - ent.h;
          ent.vy = 0;
          ent.onGround = true;
        } else {
          ent.y = b.y + b.h;
          ent.vy = 0;
        }
      }
    }
  }

  function spawnExplosion(x,y, power=1){
    for (let i=0;i<18*power;i++){
      particles.push({
        x, y,
        vx:(Math.random()*2-1)*280,
        vy:(Math.random()*2-1)*280 - 80,
        life: 0.55 + Math.random()*0.35
      });
    }
  }

  function damageEnemy(e, dmg, knock=0){
    e.hp -= dmg;
    e.hit = 0.12;
    e.vx += knock;
    if (e.hp <= 0){
      e.alive = false;
      score += (e.type==="heavy"? 300: 120);
      spawnExplosion(e.x+e.w/2, e.y+e.h/2, e.type==="heavy"?2:1);
    }
  }

  function hurtPlayer(dmg){
    if (player.inv>0) return;
    player.hp -= dmg;
    player.inv = 1.0;
    player.vy = -520;
    player.vx = -player.facing * 220;
    if (player.hp <= 0){
      running = false;
      showPanel(`
        <div class="card">
          <h1>미션 실패 💥</h1>
          <p>점수: <b>${score}</b> / 시간: <b>${elapsed.toFixed(1)}s</b></p>
          <p style="opacity:.8">R 키로 리셋하거나 새로고침!</p>
          <button class="btn" onclick="location.reload()">새로고침</button>
        </div>
      `);
    }
  }

  // ===== Actions =====
  function shoot(){
    if (player.shootCD>0) return;
    player.shootCD = 0.12; // fire rate
    const bx = player.facing>0 ? player.x+player.w : player.x-6;
    const by = player.y + 20;
    bullets.push({
      x: bx, y: by, w: 10, h: 4,
      vx: player.facing * 980,
      life: 0.85
    });
  }

  function throwGrenade(){
    if (player.gren<=0 || player.grenCD>0) return;
    player.gren -= 1;
    player.grenCD = 0.35;
    grenades.push({
      x: player.x + player.w/2,
      y: player.y + 14,
      r: 7,
      vx: player.facing * 520,
      vy: -780,
      timer: 1.1, // explode after
    });
  }

  // ===== Update =====
  function update(dt){
    elapsed += dt;

    // cooldowns
    player.shootCD = Math.max(0, player.shootCD - dt);
    player.grenCD  = Math.max(0, player.grenCD  - dt);
    player.inv     = Math.max(0, player.inv     - dt);

    // controls
    const L = keys.has("ArrowLeft");
    const R = keys.has("ArrowRight");
    const J = keys.has("ArrowUp");
    const Z = keys.has("KeyZ");
    const X = keys.has("KeyX");

    if (L) { player.vx = -MOVE; player.facing=-1; }
    else if (R) { player.vx = MOVE; player.facing=1; }
    else { player.vx *= player.onGround ? 0.82 : 0.92; if (Math.abs(player.vx)<10) player.vx=0; }

    if (J && player.onGround) { player.vy = -JUMP; player.onGround=false; }
    if (Z) shoot();
    if (X) throwGrenade();

    // integrate player
    player.vy += GRAV * dt;
    player.x += player.vx * dt;
    player.y += player.vy * dt;
    player.onGround = false;
    resolveBlocks(player);

    // keep in world
    player.x = clamp(player.x, 0, world.width - player.w);
    if (player.y > H + 200) hurtPlayer(999);

    // bullets
    for (const b of bullets){
      b.x += b.vx * dt;
      b.life -= dt;
      // collide blocks (stop)
      for (const blk of world.blocks){
        if (aabb(b, blk)) { b.life = -1; break; }
      }
      // hit enemies
      for (const e of enemies){
        if (!e.alive) continue;
        if (aabb(b,e)){
          b.life = -1;
          damageEnemy(e, 1, player.facing*40);
          score += 5;
          break;
        }
      }
    }
    bullets = bullets.filter(b => b.life > 0 && b.x > -200 && b.x < world.width+200);

    // grenades
    for (const g of grenades){
      g.vy += GRAV * dt;
      g.x += g.vx * dt;
      g.y += g.vy * dt;

      // bounce on ground
      if (g.y + g.r >= GROUND_Y) {
        g.y = GROUND_Y - g.r;
        g.vy *= -0.42;
        g.vx *= 0.75;
      }

      // bounce on blocks
      for (const blk of world.blocks){
        const box = {x:g.x-g.r, y:g.y-g.r, w:g.r*2, h:g.r*2};
        if (!aabb(box, blk)) continue;
        // simple bounce: reverse X
        g.vx *= -0.55;
        g.vy *= 0.65;
      }

      g.timer -= dt;
      if (g.timer <= 0){
        // explode: damage enemies in radius
        const rad = 120;
        spawnExplosion(g.x, g.y, 2);
        for (const e of enemies){
          if (!e.alive) continue;
          const ex = e.x + e.w/2, ey = e.y + e.h/2;
          const dx = ex - g.x, dy = ey - g.y;
          const d = Math.hypot(dx, dy);
          if (d < rad){
            const dmg = d < 55 ? 4 : 2;
            damageEnemy(e, dmg, (dx/d||0)*220);
            score += 10;
          }
        }
        g.dead = true;
      }
    }
    grenades = grenades.filter(g => !g.dead && g.x>-200 && g.x<world.width+200 && g.y< H+400);

    // enemies AI
    for (const e of enemies){
      if (!e.alive) continue;
      e.hit = Math.max(0, e.hit - dt);

      // simple patrol + chase when close
      const dist = (player.x - e.x);
      const chase = Math.abs(dist) < 360;
      const dir = dist>0 ? 1 : -1;

      if (chase) e.vx = dir * (e.type==="heavy"? 90 : 120);
      // gravity
      e.vy += GRAV * dt;

      e.x += e.vx * dt;
      e.y += e.vy * dt;
      e.onGround = false;
      resolveBlocks(e);

      // enemy shooting (heavy only, simple projectile)
      e.shootCD -= dt;
      if (e.type==="heavy" && chase && e.shootCD <= 0){
        e.shootCD = 0.9;
        // enemy bullet
        bullets.push({
          x: e.x + (dir>0? e.w : -6),
          y: e.y + 22,
          w: 10, h: 4,
          vx: dir * 720,
          life: 0.9,
          enemy:true
        });
      }

      // collide with player
      if (aabb(player, e)){
        hurtPlayer(1);
      }
    }

    // enemy bullets hitting player (flagged)
    for (const b of bullets){
      if (!b.enemy) continue;
      if (aabb(b, player)){
        b.life = -1;
        hurtPlayer(1);
      }
    }

    // camera follow
    const target = player.x - W*0.42;
    world.camX = clamp(target, 0, world.width - W);

    // win condition
    if (aabb(player, world.goal)){
      running = false;
      showPanel(`
        <div class="card">
          <h1>미션 클리어 🎖️</h1>
          <p>점수: <b>${score}</b> / 시간: <b>${elapsed.toFixed(1)}s</b></p>
          <p style="opacity:.8">R 키로 다시 플레이 가능!</p>
        </div>
      `);
    }

    syncHUD();
  }

  // ===== Draw =====
  function drawBackground(){
    // parallax clouds
    ctx.save();
    ctx.translate(-world.camX*0.25, 0);
    ctx.globalAlpha = 0.65;
    for (let i=0;i<18;i++){
      const x = (i*260 + (i%3)*40) % world.width;
      const y = 40 + (i%6)*18;
      drawCloud(x, y, 1 + (i%4)*0.12);
    }
    ctx.restore();

    // far buildings
    ctx.save();
    ctx.translate(-world.camX*0.15, 0);
    ctx.globalAlpha = 0.20;
    for (let i=0;i<20;i++){
      const x = i*220;
      ctx.fillStyle = "#20324a";
      ctx.fillRect(x, GROUND_Y-180, 140, 180);
    }
    ctx.restore();
  }

  function drawCloud(x,y,s){
    ctx.save();
    ctx.translate(x,y); ctx.scale(s,s);
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(30,20,18,0,Math.PI*2);
    ctx.arc(50,16,22,0,Math.PI*2);
    ctx.arc(74,22,16,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawWorld(){
    // ground
    ctx.fillStyle = "#2f5f3d";
    ctx.fillRect(0, GROUND_Y, world.width, H-GROUND_Y);
    // dirt layer
    ctx.fillStyle = "rgba(0,0,0,.15)";
    ctx.fillRect(0, GROUND_Y, world.width, 12);

    // blocks (cover)
    for (const b of world.blocks){
      ctx.fillStyle = "#3a2a1b";
      ctx.fillRect(b.x,b.y,b.w,b.h);
      ctx.fillStyle = "#2aa95a";
      ctx.fillRect(b.x,b.y,b.w,6);
      ctx.globalAlpha = 0.25;
      ctx.fillStyle="#000";
      for (let x=b.x; x<b.x+b.w; x+=26) ctx.fillRect(x, b.y+10, 14, 4);
      ctx.globalAlpha = 1;
    }

    // goal flag
    ctx.fillStyle="#c9c9c9";
    ctx.fillRect(world.goal.x, world.goal.y, 10, world.goal.h);
    ctx.fillStyle="#ffcf4d";
    ctx.fillRect(world.goal.x+10, world.goal.y+10, 46, 28);
    ctx.fillStyle="rgba(0,0,0,.2)";
    ctx.fillRect(world.goal.x+14, world.goal.y+14, 18, 6);
  }

  function drawPlayer(){
    ctx.save();
    ctx.translate(player.x, player.y);

    if (player.inv>0 && Math.floor(performance.now()/90)%2===0) ctx.globalAlpha=0.35;

    // helmet
    ctx.fillStyle="#e33b3b";
    ctx.fillRect(4,0,player.w-8,10);

    // head
    ctx.fillStyle="#ffd3b3";
    ctx.fillRect(6,10,player.w-12,12);

    // body armor
    ctx.fillStyle="#2e6bff";
    ctx.fillRect(4,22,player.w-8,16);

    // legs
    ctx.fillStyle="#1c1c1c";
    ctx.fillRect(6,38,10,8);
    ctx.fillRect(player.w-16,38,10,8);

    // gun
    ctx.fillStyle="#333";
    const gx = player.facing>0 ? player.w-2 : -14;
    ctx.fillRect(gx, 26, 16, 4);

    ctx.restore();
  }

  function drawEnemy(e){
    if (!e.alive) return;
    ctx.save();
    ctx.translate(e.x, e.y);

    ctx.fillStyle = e.type==="heavy" ? "#5b3b73" : "#7a3a1d";
    if (e.hit>0) ctx.fillStyle = "#ff7b7b";
    ctx.fillRect(0,0,e.w,e.h);

    // face stripe
    ctx.fillStyle="rgba(255,255,255,.18)";
    ctx.fillRect(4,8,e.w-8,6);

    // eyes
    ctx.fillStyle="#111";
    ctx.fillRect(10,14,6,6);
    ctx.fillRect(e.w-16,14,6,6);

    // weapon on heavy
    if (e.type==="heavy"){
      ctx.fillStyle="#2b2b2b";
      ctx.fillRect(e.w-6, 26, 14, 4);
    }

    ctx.restore();
  }

  function drawBullets(){
    for (const b of bullets){
      ctx.fillStyle = b.enemy ? "#ff5b5b" : "#111";
      ctx.fillRect(b.x,b.y,b.w,b.h);
    }
  }

  function drawGrenades(){
    for (const g of grenades){
      ctx.fillStyle="#3a3a3a";
      ctx.beginPath();
      ctx.arc(g.x,g.y,g.r,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle="rgba(255,255,255,.25)";
      ctx.fillRect(g.x-2,g.y-3,4,3);
    }
  }

  function drawParticles(dt){
    for (const p of particles){
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 900 * dt;
      p.life -= dt;
    }
    particles = particles.filter(p=>p.life>0);
    for (const p of particles){
      ctx.globalAlpha = clamp(p.life, 0, 1);
      ctx.fillStyle = "#ffcf4d";
      ctx.fillRect(p.x, p.y, 4, 4);
      ctx.globalAlpha = 1;
    }
  }

  // ===== Main loop =====
  function loop(ts){
    if (!running) return;
    const dt = Math.min(0.033, (ts - last)/1000);
    last = ts;

    update(dt);

    ctx.clearRect(0,0,W,H);
    ctx.save();
    ctx.translate(-world.camX, 0);

    drawBackground();
    drawWorld();
    drawGrenades();
    drawBullets();

    for (const e of enemies) drawEnemy(e);
    drawPlayer();

    drawParticles(dt);

    ctx.restore();

    requestAnimationFrame(loop);
  }

  // Start
  startBtn.addEventListener("click", ()=> hardReset(true));
  resetState();

})();
</script>
</body>
</html>
