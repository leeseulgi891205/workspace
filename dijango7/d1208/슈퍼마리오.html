<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Plumber Runner (Mario-ish)</title>
  <style>
    html, body { margin:0; height:100%; background:#0b1020; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", sans-serif; }
    .wrap { display:flex; flex-direction:column; height:100%; }
    .hud {
      color:#d6e3ff; padding:10px 12px; display:flex; gap:16px; align-items:center;
      background: linear-gradient(to bottom, rgba(255,255,255,.06), rgba(255,255,255,0));
      border-bottom: 1px solid rgba(255,255,255,.08);
      user-select:none;
    }
    .hud b { color:#fff; }
    .hint { opacity:.85; font-size:13px; }
    canvas { width:100%; height:100%; display:block; background: linear-gradient(#78c7ff 0%, #b8e7ff 45%, #e9f8ff 100%); }
    .panel {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      background: rgba(0,0,0,.45); color:#fff; text-align:center; padding:20px;
      backdrop-filter: blur(4px);
    }
    .card {
      background: rgba(10,14,30,.92); border:1px solid rgba(255,255,255,.12);
      border-radius: 16px; padding:18px 16px; max-width:520px;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
    }
    .card h1 { font-size:20px; margin:0 0 8px; }
    .card p { margin:6px 0; opacity:.9; }
    .btn {
      display:inline-block; margin-top:10px; padding:10px 14px; border-radius:12px;
      background:#2e6bff; color:#fff; border:0; cursor:pointer; font-weight:700;
    }
    .btn:active { transform: translateY(1px); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <div>코인: <b id="coins">0</b></div>
    <div>목숨: <b id="lives">3</b></div>
    <div>시간: <b id="time">0.0</b>s</div>
    <div class="hint">← → 이동 / ↑ 또는 Space 점프 / R 리셋</div>
  </div>
  <div style="position:relative; flex:1;">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="panel" class="panel">
      <div class="card">
        <h1>Mini Plumber Runner 🧰</h1>
        <p>점프해서 코인을 먹고, 적을 밟아 처치하고, 깃발까지 가면 승리!</p>
        <p style="opacity:.75">*원작 재현이 아니라 “마리오풍” 미니 플랫포머야.</p>
        <button class="btn" id="startBtn">시작</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const uiCoins = document.getElementById("coins");
  const uiLives = document.getElementById("lives");
  const uiTime  = document.getElementById("time");
  const panel = document.getElementById("panel");
  const startBtn = document.getElementById("startBtn");

  // ====== Helpers ======
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const aabb = (a, b) =>
    a.x < b.x + b.w && a.x + a.w > b.x &&
    a.y < b.y + b.h && a.y + a.h > b.y;

  // ====== Game state ======
  const W = canvas.width, H = canvas.height;
  const GRAV = 2100;       // px/s^2
  const MOVE = 420;        // px/s
  const JUMP = 860;        // px/s
  const FRICTION = 0.86;   // ground friction
  const AIR_DRAG = 0.94;   // air drag

  let keys = new Set();
  let running = false;
  let t0 = 0;
  let elapsed = 0;

  // Camera
  const cam = { x:0, y:0 };

  // ====== Level ======
  // World is wider than screen -> camera follows player.
  const level = {
    width: 3200,
    height: H,
    platforms: [
      // ground
      {x:0, y:H-54, w:3200, h:54},
      // steps + floating platforms
      {x:320, y:H-120, w:180, h:18},
      {x:560, y:H-190, w:220, h:18},
      {x:860, y:H-260, w:220, h:18},
      {x:1200, y:H-150, w:240, h:18},
      {x:1520, y:H-220, w:240, h:18},
      {x:1860, y:H-170, w:220, h:18},
      {x:2140, y:H-240, w:260, h:18},
      {x:2500, y:H-140, w:260, h:18},
      {x:2820, y:H-210, w:220, h:18},
    ],
    pits: [
      // cut out ground sections visually (collision still ground; we'll handle by killing when falling)
      {x:1020, w:140},
      {x:1700, w:160},
      {x:2360, w:140},
    ],
    flag: { x: 3060, y: H-250, w: 18, h: 196 },
  };

  // Coins placed on platforms
  let coins = [];
  function seedCoins() {
    coins = [
      {x:380, y:H-170, r:10, got:false},
      {x:420, y:H-170, r:10, got:false},
      {x:620, y:H-240, r:10, got:false},
      {x:700, y:H-240, r:10, got:false},
      {x:920, y:H-310, r:10, got:false},
      {x:1000, y:H-310, r:10, got:false},
      {x:1260, y:H-200, r:10, got:false},
      {x:1600, y:H-270, r:10, got:false},
      {x:1640, y:H-270, r:10, got:false},
      {x:1900, y:H-220, r:10, got:false},
      {x:2220, y:H-290, r:10, got:false},
      {x:2260, y:H-290, r:10, got:false},
      {x:2540, y:H-190, r:10, got:false},
      {x:2580, y:H-190, r:10, got:false},
      {x:2860, y:H-260, r:10, got:false},
    ];
  }

  // Enemies (simple walkers)
  let enemies = [];
  function seedEnemies() {
    enemies = [
      {x:720,  y:H-84, w:38, h:30, vx:-90, alive:true},
      {x:1460, y:H-84, w:38, h:30, vx:110, alive:true},
      {x:2050, y:H-84, w:38, h:30, vx:-120, alive:true},
      {x:2660, y:H-84, w:38, h:30, vx:100, alive:true},
    ];
  }

  // Player
  const player = {
    x: 80, y: H-120, w: 34, h: 42,
    vx: 0, vy: 0,
    onGround: false,
    facing: 1,
    invuln: 0,
  };

  const game = {
    coins: 0,
    lives: 3,
    win: false,
    over: false,
  };

  function resetAll() {
    player.x = 80; player.y = H-120;
    player.vx = 0; player.vy = 0;
    player.onGround = false;
    player.invuln = 0;
    cam.x = 0; cam.y = 0;
    game.coins = 0;
    game.lives = 3;
    game.win = false;
    game.over = false;
    elapsed = 0;
    seedCoins();
    seedEnemies();
    syncHUD();
  }

  function syncHUD() {
    uiCoins.textContent = String(game.coins);
    uiLives.textContent = String(game.lives);
    uiTime.textContent = elapsed.toFixed(1);
  }

  // ====== Input ======
  window.addEventListener("keydown", (e) => {
    if (["ArrowLeft","ArrowRight","ArrowUp","Space","KeyR"].includes(e.code)) e.preventDefault();
    keys.add(e.code);
    if (e.code === "KeyR") {
      resetAll();
      hidePanel();
      running = true;
      t0 = performance.now();
    }
  });
  window.addEventListener("keyup", (e) => keys.delete(e.code));

  function showPanel(html) {
    panel.innerHTML = html;
    panel.style.display = "flex";
  }
  function hidePanel() {
    panel.style.display = "none";
  }

  startBtn.addEventListener("click", () => {
    resetAll();
    hidePanel();
    running = true;
    t0 = performance.now();
    requestAnimationFrame(loop);
  });

  // ====== Physics & collisions ======
  function applyControls(dt) {
    const left = keys.has("ArrowLeft");
    const right = keys.has("ArrowRight");
    const jump = keys.has("ArrowUp") || keys.has("Space");

    if (left) {
      player.vx = -MOVE;
      player.facing = -1;
    } else if (right) {
      player.vx = MOVE;
      player.facing = 1;
    } else {
      // slow down if no input
      player.vx *= player.onGround ? FRICTION : AIR_DRAG;
      if (Math.abs(player.vx) < 8) player.vx = 0;
    }

    if (jump && player.onGround) {
      player.vy = -JUMP;
      player.onGround = false;
    }

    // gravity
    player.vy += GRAV * dt;
    player.vy = clamp(player.vy, -3000, 2600);
  }

  function resolvePlatformCollisions(entity, dt) {
    // Move X then resolve
    entity.x += entity.vx * dt;
    for (const p of level.platforms) {
      if (aabb(entity, p)) {
        if (entity.vx > 0) entity.x = p.x - entity.w;
        else if (entity.vx < 0) entity.x = p.x + p.w;
        entity.vx = 0;
      }
    }

    // Move Y then resolve
    entity.y += entity.vy * dt;
    entity.onGround = false;
    for (const p of level.platforms) {
      if (aabb(entity, p)) {
        if (entity.vy > 0) {
          entity.y = p.y - entity.h;
          entity.vy = 0;
          entity.onGround = true;
        } else if (entity.vy < 0) {
          entity.y = p.y + p.h;
          entity.vy = 0;
        }
      }
    }
  }

  function updateEnemies(dt) {
    for (const e of enemies) {
      if (!e.alive) continue;
      // basic gravity + platform collision (treat enemy as entity)
      e.vy = (e.vy ?? 0) + GRAV * dt;
      e.vx = e.vx; // keep
      resolvePlatformCollisions(e, dt);

      // bounce off edges / turn around when stuck
      if (e.x < 0) { e.x = 0; e.vx = Math.abs(e.vx); }
      if (e.x + e.w > level.width) { e.x = level.width - e.w; e.vx = -Math.abs(e.vx); }

      // if enemy hits a "pit zone" area on ground, still ok; pits are visual only.
      // add small random wobble? keep simple.
    }
  }

  function checkCoins() {
    for (const c of coins) {
      if (c.got) continue;
      const cx = c.x, cy = c.y;
      const px = player.x + player.w/2, py = player.y + player.h/2;
      const dist2 = (cx-px)*(cx-px) + (cy-py)*(cy-py);
      if (dist2 < (c.r + 18)*(c.r + 18)) {
        c.got = true;
        game.coins += 1;
      }
    }
  }

  function hurtPlayer() {
    if (player.invuln > 0) return;
    game.lives -= 1;
    player.invuln = 1.2;
    // knockback
    player.vy = -520;
    player.vx = -player.facing * 220;

    if (game.lives <= 0) {
      game.over = true;
      running = false;
      showPanel(`
        <div class="card">
          <h1>게임 오버 💀</h1>
          <p>코인: <b>${game.coins}</b> / 시간: <b>${elapsed.toFixed(1)}s</b></p>
          <p class="hint">R 키로 리셋하거나 새로고침!</p>
          <button class="btn" onclick="location.reload()">새로고침</button>
        </div>
      `);
    }
  }

  function checkEnemies(dt) {
    for (const e of enemies) {
      if (!e.alive) continue;
      if (aabb(player, e)) {
        // stomp if falling and player's feet above enemy top
        const playerBottom = player.y + player.h;
        const enemyTop = e.y;
        const falling = player.vy > 120;

        if (falling && playerBottom - enemyTop < 18) {
          e.alive = false;
          player.vy = -560; // bounce
        } else {
          hurtPlayer();
        }
      }
    }
  }

  function checkWin() {
    const flagBox = { x: level.flag.x, y: level.flag.y, w: level.flag.w, h: level.flag.h };
    if (aabb(player, flagBox)) {
      game.win = true;
      running = false;
      showPanel(`
        <div class="card">
          <h1>클리어! 🏁</h1>
          <p>코인: <b>${game.coins}</b> / 남은 목숨: <b>${game.lives}</b></p>
          <p>클리어 시간: <b>${elapsed.toFixed(1)}s</b></p>
          <p class="hint">R 키로 다시 도전 가능!</p>
        </div>
      `);
    }
  }

  function keepInWorld() {
    // If falls below screen -> lose life and respawn
    if (player.y > H + 200) {
      game.lives -= 1;
      if (game.lives <= 0) {
        game.over = true;
        running = false;
        showPanel(`
          <div class="card">
            <h1>게임 오버 💀</h1>
            <p>낙사로 끝… 코인: <b>${game.coins}</b></p>
            <p class="hint">R 키로 리셋!</p>
          </div>
        `);
        return;
      }
      // respawn
      player.x = clamp(player.x - 120, 40, level.width - 80);
      player.y = H - 220;
      player.vx = 0;
      player.vy = 0;
      player.invuln = 1.0;
    }

    player.x = clamp(player.x, 0, level.width - player.w);
  }

  function updateCamera() {
    const targetX = player.x - W * 0.45;
    cam.x = clamp(targetX, 0, level.width - W);
    cam.y = 0;
  }

  // ====== Render ======
  function drawBackground() {
    // clouds
    ctx.save();
    ctx.translate(-cam.x * 0.3, 0);
    ctx.globalAlpha = 0.65;
    for (let i=0;i<18;i++){
      const x = (i*220 + (i%3)*40) % (level.width);
      const y = 40 + (i%5)*18;
      drawCloud(x, y, 1 + (i%4)*0.12);
    }
    ctx.restore();

    // far hills
    ctx.save();
    ctx.translate(-cam.x * 0.2, 0);
    ctx.globalAlpha = 0.35;
    for (let i=0;i<10;i++){
      const x = i*420;
      drawHill(x+80, H-54, 220, 120);
    }
    ctx.restore();
  }

  function drawCloud(x,y,s) {
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(s,s);
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(30,20,18,0,Math.PI*2);
    ctx.arc(50,16,22,0,Math.PI*2);
    ctx.arc(74,22,16,0,Math.PI*2);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawHill(x, groundY, w, h) {
    ctx.fillStyle = "rgba(10,90,60,0.8)";
    ctx.beginPath();
    ctx.ellipse(x, groundY, w*0.6, h*0.7, 0, Math.PI, 0, true);
    ctx.closePath();
    ctx.fill();
  }

  function drawPlatform(p) {
    ctx.fillStyle = "#3a2a1b";
    ctx.fillRect(p.x, p.y, p.w, p.h);
    // top grass
    ctx.fillStyle = "#2aa95a";
    ctx.fillRect(p.x, p.y, p.w, Math.min(6, p.h));
    // little bricks
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = "#000";
    for (let x=p.x; x<p.x+p.w; x+=28) ctx.fillRect(x, p.y+8, 14, 4);
    ctx.globalAlpha = 1;
  }

  function drawCoin(c) {
    if (c.got) return;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.fillStyle = "#ffcf4d";
    ctx.beginPath();
    ctx.ellipse(0,0,c.r, c.r*1.2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,.25)";
    ctx.stroke();
    ctx.restore();
  }

  function drawEnemy(e) {
    if (!e.alive) return;
    ctx.save();
    ctx.translate(e.x, e.y);
    // body
    ctx.fillStyle = "#7a3a1d";
    ctx.fillRect(0, 0, e.w, e.h);
    // face stripe
    ctx.fillStyle = "rgba(255,255,255,.18)";
    ctx.fillRect(4, 6, e.w-8, 6);
    // eyes
    ctx.fillStyle = "#111";
    ctx.fillRect(10, 12, 6, 6);
    ctx.fillRect(e.w-16, 12, 6, 6);
    ctx.restore();
  }

  function drawPlayer() {
    ctx.save();
    ctx.translate(player.x, player.y);

    // blink when invuln
    if (player.invuln > 0 && Math.floor(performance.now()/90) % 2 === 0) {
      ctx.globalAlpha = 0.35;
    }

    // hat
    ctx.fillStyle = "#e33b3b";
    ctx.fillRect(2, 0, player.w-4, 10);
    // head
    ctx.fillStyle = "#ffd3b3";
    ctx.fillRect(6, 10, player.w-12, 12);
    // body
    ctx.fillStyle = "#2e6bff";
    ctx.fillRect(4, 22, player.w-8, 14);
    // legs
    ctx.fillStyle = "#2b1a10";
    ctx.fillRect(6, 36, 8, 6);
    ctx.fillRect(player.w-14, 36, 8, 6);

    // nose direction
    ctx.fillStyle = "#eaa88a";
    if (player.facing > 0) ctx.fillRect(player.w-6, 14, 4, 4);
    else ctx.fillRect(2, 14, 4, 4);

    ctx.restore();
  }

  function drawFlag() {
    const f = level.flag;
    // pole
    ctx.fillStyle = "#c9c9c9";
    ctx.fillRect(f.x, f.y, f.w, f.h);
    // flag cloth
    ctx.fillStyle = "#2aa95a";
    ctx.fillRect(f.x + f.w, f.y + 12, 72, 40);
    ctx.fillStyle = "rgba(255,255,255,.35)";
    ctx.fillRect(f.x + f.w + 10, f.y + 22, 22, 8);
    // base
    ctx.fillStyle = "#3a2a1b";
    ctx.fillRect(f.x-20, H-54, 70, 12);
  }

  function drawPitHoles() {
    // draw holes on ground for visual pits
    const gy = H-54;
    for (const pit of level.pits) {
      ctx.fillStyle = "rgba(0,0,0,.35)";
      ctx.fillRect(pit.x, gy, pit.w, 54);
      // highlight
      ctx.fillStyle = "rgba(255,255,255,.06)";
      ctx.fillRect(pit.x, gy, pit.w, 6);
    }
  }

  function draw() {
    ctx.clearRect(0,0,W,H);

    // world transform
    ctx.save();
    ctx.translate(-cam.x, -cam.y);

    drawBackground();

    // platforms
    for (const p of level.platforms) drawPlatform(p);

    // pits visual
    drawPitHoles();

    // coins
    for (const c of coins) drawCoin(c);

    // enemies
    for (const e of enemies) drawEnemy(e);

    // flag
    drawFlag();

    // player
    drawPlayer();

    ctx.restore();

    // border vignette
    ctx.save();
    ctx.globalAlpha = 0.22;
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"rgba(0,0,0,.20)");
    g.addColorStop(0.25,"rgba(0,0,0,0)");
    g.addColorStop(0.85,"rgba(0,0,0,0)");
    g.addColorStop(1,"rgba(0,0,0,.28)");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // ====== Main loop ======
  function loop(now) {
    if (!running) return;
    const dt = Math.min(0.033, (now - t0) / 1000);
    t0 = now;

    elapsed += dt;

    // invulnerability timer
    if (player.invuln > 0) player.invuln = Math.max(0, player.invuln - dt);

    applyControls(dt);
    resolvePlatformCollisions(player, dt);
    keepInWorld();

    updateEnemies(dt);
    checkCoins();
    checkEnemies(dt);
    checkWin();

    updateCamera();
    syncHUD();
    draw();

    requestAnimationFrame(loop);
  }

  // Boot splash
  resetAll();

})();
</script>
</body>
</html>
