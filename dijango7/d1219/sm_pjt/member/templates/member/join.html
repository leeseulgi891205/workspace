{% extends 'base.html' %}

{% block title-block %}
<title>회원가입</title>
{% endblock title-block %}

{% block css-block %}
<style>
  .join-container {
    max-width: 420px;
    margin: 40px auto;
    padding: 32px 28px 24px 28px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    border: 1px solid #e0e0e0;
  }
  .join-container h2 {
    text-align: center;
    margin-bottom: 28px;
    color: #2d3a4b;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .join-form label {
    font-weight: 600;
    color: #495057;
    margin-bottom: 6px;
    display: block;
  }
  .join-form input[type="text"],
  .join-form input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 15px;
    background: #f9fafb;
    transition: border 0.2s;
  }
  .join-form input[type="text"]:focus,
  .join-form input[type="password"]:focus {
    border: 1.5px solid #1976d2;
    background: #fff;
    outline: none;
  }
  .join-form button {
    background: #1976d2;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 0;
    width: 100%;
    font-size: 16px;
    font-weight: 600;
    margin-top: 10px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .join-form button:hover {
    background: #1251a3;
  }
  .join-form .row {
    display: flex;
    gap: 8px;
  }
  .join-form .row input {
    flex: 1;
    margin-bottom: 0;
  }
  .join-form .row button {
    width: auto;
    padding: 0 16px;
    margin-top: 0;
  }
  #sms_result {
    font-size: 13px;
    margin-left: 8px;
  }
</style>
{% endblock css-block %}

{% block body-block %}
<div class="join-container">
  <h2><i class="fa-regular fa-chess-queen"></i> 회원가입</h2>
  <form method="post" action="/member/join/" id="joinForm" class="join-form">
    {% csrf_token %}
    <label>아이디</label>
    <input type="text" name="userid" required maxlength="20">
    <label>비밀번호</label>
    <input type="password" name="password" required maxlength="20">
    <label>이름</label>
    <input type="text" name="name" required maxlength="20">
    <label>휴대폰</label>
    <div class="row" style="margin-bottom:18px;">
      <input type="text" name="phone" id="phone" required maxlength="13" placeholder="010-0000-0000">
      <button type="button" onclick="sendSMS()">인증번호 발송</button>
    </div>
    <div class="row" style="margin-bottom:22px;">
      <input type="text" name="sms_code" id="sms_code" placeholder="인증번호 입력">
      <button type="button" onclick="verifySMS()">인증확인</button>
      <span id="sms_result"></span>
    </div>
    <label>주소</label>
    <div class="row">
      <input type="text" name="zipcode" id="zipcode" placeholder="우편번호" readonly style="max-width:110px;">
      <button type="button" onclick="execDaumPostcode()">주소검색</button>
    </div>
    <input type="text" name="address" id="address" placeholder="기본주소" readonly style="margin-bottom:8px;">
    <input type="text" name="address_detail" id="address_detail" placeholder="상세주소">
    <button type="submit">회원가입</button>
  </form>
</div>

<!-- Daum 주소 API -->
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
function execDaumPostcode() {
    new daum.Postcode({
        oncomplete: function(data) {
            document.getElementById('zipcode').value = data.zonecode;
            document.getElementById('address').value = data.roadAddress || data.jibunAddress;
            document.getElementById('address_detail').focus();
        }
    }).open();
}
function sendSMS() {
    // 실제로는 이메일로 인증번호 발송
    fetch('/member/send_email_code/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: 'email=soduwkma@naver.com'
    })
    .then(response => response.json())
    .then(data => {
        if(data.result === 'ok') {
            alert('인증번호가 soduwkma@naver.com 으로 발송되었습니다.');
            document.getElementById('sms_code').value = data.code;
        } else {
            alert('인증번호 발송 실패');
        }
    });
}
function verifySMS() {
    alert('인증이 확인되었습니다. (실제 구현 필요)');
    document.getElementById('sms_result').innerText = '인증완료';
    document.getElementById('sms_result').style.color = 'green';
}
</script>
{% endblock body-block %}
