<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 등록</title>
</head>
<body>
    <h2>학생 등록 페이지</h2>
    <form action="{% url 'student:write' %}" method="post">
        {% csrf_token %}
        <fieldset>
            <legend>기본 정보</legend>
            <label>아이디:</label>
            <input type="text" name="user_id" required><br>
            <label>비밀번호:</label>
            <input type="password" name="password" required><br>
            <label>이름:</label>
            <input type="text" name="name" required><br>
            <label>닉네임:</label>
            <input type="text" name="nickname" required><br>
        </fieldset>
        <br>
        <fieldset>
            <legend>연락처 정보</legend>
            <label>이메일:</label>
            <input type="email" name="email" required><br>
            <label>전화번호:</label>
            <input type="text" name="phone" placeholder="010-0000-0000" required><br>
        </fieldset>
        <br>
        <fieldset>
            <legend>개인 정보</legend>
            <label>성별:</label><br>
            <input type="radio" name="gender" value="남자" id="male" required>
            <label for="male">남자</label>
            <input type="radio" name="gender" value="여자" id="female">
            <label for="female">여자</label><br>
            <label>나이:</label>
            <input type="number" name="age" required><br>
            <label>학년:</label>
            <input type="number" name="grade" required><br>
            <label>취미:</label>
            <input type="text" name="hobby"><br>
        </fieldset>
        <br>
        <input type="submit" value="등록">
    </form>
    <ul>
        <li><a href="/student/list/">학생 리스트</a></li>
        <li><a href="/">홈으로</a></li>
    </ul>
</body>
</html>
