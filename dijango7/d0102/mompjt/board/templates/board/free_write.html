{% extends 'base.html' %}

{% block content %}
<div class="login-container">
    <h2>{% if is_edit %}글 수정{% else %}글쓰기{% endif %}</h2>

    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_category">카테고리</label>
            <select name="category" id="id_category" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px;">
                <option value="mom" {% if form.instance.category == 'mom' %}selected{% endif %}>육아수다</option>
                <option value="husband" {% if form.instance.category == 'husband' %}selected{% endif %}>남편뒷담화</option>
                <option value="family" {% if form.instance.category == 'family' %}selected{% endif %}>시댁/친정</option>
                <option value="preg" {% if form.instance.category == 'preg' %}selected{% endif %}>임신출산</option>
                <option value="bamboo" {% if form.instance.category == 'bamboo' %}selected{% endif %}>대나무숲  (익명)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="id_is_anonymous" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" name="is_anonymous" id="id_is_anonymous" {% if form.instance.is_anonymous %}checked{% endif %} style="width: auto;">
                <span>익명으로 작성 (작성자 이름이 표시되지 않습니다)</span>
            </label>
            <p style="font-size: 13px; color: #666; margin-top: 5px; padding-left: 26px;">
                대나무숲 카테고리를 선택하면 자동으로 익명 처리됩니다.
            </p>
        </div>

        <div class="form-group">
            <label for="id_title">제목</label>
            <input type="text" name="title" id="id_title" value="{{ form.instance.title }}" required placeholder="제목을 입력하세요">
        </div>

        <div class="form-group">
            <label for="id_content">내용</label>
            <textarea name="content" id="id_content" required placeholder="내용을 자유롭게 작성해주세요" style="min-height: 250px; resize: vertical;">{{ form.instance.content }}</textarea>
        </div>

        <button type="submit" class="btn-login-submit">{% if is_edit %}수정 완료{% else %}등록하기{% endif %}</button>
    </form>

    <div class="login-links">
        <a href="{% url 'board:free_list' %}">목록으로 돌아가기</a>
    </div>
</div>
{% endblock %}
