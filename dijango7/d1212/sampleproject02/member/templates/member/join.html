{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="http://code.jquery.com/jquery-latest.min.js"></script>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <title>VLAST Shop - 회원가입</title>
  <style>
    .checkbox-group {
      margin: 10px 0;
    }
    .checkbox-group label {
      margin-right: 15px;
    }
  </style>
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script>
    function execDaumPostcode() {
      new daum.Postcode({
        oncomplete: function(data) {
          // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드
          var addr = ''; // 주소 변수
          
          //사용자가 선택한 주소 타입에 따라 해당 주소 값을 가져온다.
          if (data.userSelectedType === 'R') { // 사용자가 도로명 주소를 선택했을 경우
            addr = data.roadAddress;
          } else { // 사용자가 지번 주소를 선택했을 경우(J)
            addr = data.jibunAddress;
          }
          
          // 우편번호와 주소 정보를 해당 필드에 넣는다.
          document.getElementById('zipcode').value = data.zonecode;
          document.getElementById("address").value = addr;
          // 커서를 상세주소 필드로 이동한다.
          document.getElementById("addressdetail").focus();
        }
      }).open();
    }
    
    function joinBtn(){
      if ($("input[name='id']").val().length < 1){
        alert("아이디를 입력하세요.");
        return false;
      }
      if ($("input[name='pw']").val().length < 1){
        alert("비밀번호를 입력하세요.");
        return false;
      }
      if ($("input[name='name']").val().length < 1){
        alert("이름을 입력하세요.");
        return false;
      }
      frm.submit();
    }
  </script>
</head>
<body>
  <div class="header">
    <div class="top-menu">
      <a href="{% url 'member:join' %}">회원가입</a> |
      <a href="{% url 'member:login' %}">로그인</a> |
      <a href="#">주문조회</a> |
      <a href="#">최근본상품</a>
    </div>
    <div class="icons">
      <i class="fas fa-search"></i>
      <i class="fas fa-user"></i>
      <i class="fas fa-shopping-bag"></i>
    </div>
  </div>
  <div class="container">
    <div class="login-box" style="width: 400px;">
      <h1>회원가입</h1>
      <form action="{% url 'member:join' %}" method="post" name="frm" enctype="multipart/form-data">
        {% csrf_token %}
        <label>아이디</label>
        <input type="text" name="id" placeholder="아이디" class="input-box" required>
        
        <label>비밀번호</label>
        <input type="password" name="pw" placeholder="비밀번호" class="input-box" required>
        
        <label>이름</label>
        <input type="text" name="name" placeholder="이름" class="input-box" required>
        
        <label>전화번호</label>
        <input type="text" name="phone" placeholder="010-0000-0000" class="input-box" value="010-0000-0000">
        
        <label>우편번호</label>
        <div style="display:flex; gap:5px;">
          <input type="text" name="zipcode" id="zipcode" placeholder="우편번호" class="input-box" readonly style="flex:1;">
          <button type="button" onclick="execDaumPostcode()" class="btn" style="background:#4CAF50; width:100px;">주소찾기</button>
        </div>
        
        <label>주소</label>
        <input type="text" name="address" id="address" placeholder="주소" class="input-box" readonly>
        
        <label>상세주소</label>
        <input type="text" name="addressdetail" id="addressdetail" placeholder="상세주소" class="input-box">
        
        <label>프로필 사진</label>
        <input type="file" name="profile_image" accept="image/*" class="input-box" style="padding:8px;">
        
        <label>성별</label>
        <div class="checkbox-group">
          <input type="radio" name="gender" value="남자" id="male" checked>
          <label for="male">남자</label>
          <input type="radio" name="gender" value="여자" id="female">
          <label for="female">여자</label>
        </div>
        
        <label>취미</label>
        <div class="checkbox-group">
          <input type="checkbox" name="hobby" value="게임" id="game">
          <label for="game">게임</label>
          <input type="checkbox" name="hobby" value="골프" id="golf">
          <label for="golf">골프</label>
          <input type="checkbox" name="hobby" value="수영" id="swim">
          <label for="swim">수영</label>
          <input type="checkbox" name="hobby" value="조깅" id="jogging">
          <label for="jogging">조깅</label>
          <input type="checkbox" name="hobby" value="독서" id="reading">
          <label for="reading">독서</label>
        </div>
        
        <button type="button" onclick="joinBtn()" class="btn btn-login">회원가입</button>
        <a href="{% url 'member:login' %}"><button type="button" class="btn" style="background:#ccc;">취소</button></a>
      </form>
    </div>
  </div>
  <footer>
    Copyright © VLAST Shop. All rights reserved.
  </footer>
</body>
</html>
