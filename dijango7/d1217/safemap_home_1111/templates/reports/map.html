{% extends 'base.html' %}
{% block title %}SafeMap | 지도{% endblock %}
{% block head %}
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
{% endblock %}
{% block content %}
<div class="grid grid-2">
  <!-- Sidebar -->
  <div class="card">
    <h2 style="margin:0 0 8px;">안전 지도</h2>
    <div class="small">지역 선택(드릴다운) + 기간 필터로 해당 지역 사건만 로딩합니다.</div>

    <div class="btnrow" style="margin-top:12px;">
      <button class="btn" onclick="setDays(7)">최근 7일</button>
      <button class="btn" onclick="setDays(30)">최근 30일</button>
      <a class="btn primary" href="{% url 'reports:new' %}">+ 제보</a>
    </div>

    <hr>

    <div class="small" style="margin-bottom:8px;">지역 선택</div>

    <label>시/도</label>
    <select id="selCity" onchange="onCityChange()"></select>

    <label style="margin-top:10px;">시/군/구</label>
    <select id="selArea"></select>

    <div class="btnrow" style="margin-top:12px;">
      <button class="btn primary" onclick="applyRegion()">이 지역 보기</button>
      <button class="btn" onclick="resetRegion()">전체 보기</button>
    </div>

    <hr>

    <div class="badge" id="regionLabel">전체</div>
    <div class="small" id="stat" style="margin-top:10px;"></div>


  </div>

  <!-- Map -->
  <div class="card" style="padding:0;overflow:hidden;">
    <div id="map" style="height:520px;"></div>
  </div>
</div>

<script>
let DAYS = 7;

// ===== Region dataset (center + zoom + bbox: minLng,minLat,maxLng,maxLat) =====
// bbox는 대략값(포폴용 MVP). 필요하면 행정구역 경계로 더 정확하게 업그레이드 가능.
const REGION_TREE = {
  seoul: {
    name: "서울특별시",
    center: [37.5665, 126.9780], zoom: 11,
    bbox: [126.764, 37.428, 127.184, 37.701],
    areas: {
      gangnam: { name: "강남구", center:[37.5172,127.0473], zoom: 13, bbox:[127.000,37.470,127.100,37.540] },
      mapo:   { name: "마포구(홍대)", center:[37.5563,126.9220], zoom: 13, bbox:[126.875,37.535,126.955,37.585] },
      songpa: { name: "송파구(잠실)", center:[37.5145,127.1059], zoom: 13, bbox:[127.060,37.490,127.140,37.535] },
    }
  },
  gyeonggi: {
    name: "경기도",
    center: [37.4138, 127.5183], zoom: 9,
    bbox: [126.400, 36.800, 128.900, 38.300],
    areas: {
      suwon:   { name: "수원시", center:[37.2636,127.0286], zoom: 12, bbox:[126.94,37.20,127.12,37.33] },
      seongnam:{ name: "성남시", center:[37.4449,127.1389], zoom: 12, bbox:[127.05,37.38,127.22,37.49] },
      goyang:  { name: "고양시", center:[37.6584,126.8320], zoom: 12, bbox:[126.70,37.60,126.93,37.73] },
    }
  },
  incheon: {
    name: "인천광역시",
    center: [37.4563, 126.7052], zoom: 11,
    bbox: [126.350, 37.340, 126.950, 37.650],
    areas: {
      yeonsu:  { name: "연수구", center:[37.4104,126.6788], zoom: 13, bbox:[126.62,37.36,126.74,37.44] },
      bupyeong:{ name: "부평구", center:[37.5071,126.7219], zoom: 13, bbox:[126.66,37.47,126.78,37.54] },
      namdong: { name: "남동구", center:[37.4465,126.7310], zoom: 12, bbox:[126.66,37.40,126.82,37.50] },
    }
  }
};

// ===== Leaflet map =====
let map = L.map('map').setView([37.5665, 126.9780], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let layer = L.layerGroup().addTo(map);
let ACTIVE_BBOX = null; // array [minLng,minLat,maxLng,maxLat] or null

function iconFor(item){
  let emoji = "⚠️";
  if(item.category === "violence") emoji = "🚨";
  else if(item.category === "fire") emoji = "🔥";
  else if(item.category === "traffic") emoji = "🚗";
  else if(item.category === "lost") emoji = "🧳";
  let html = `<div style="font-size:22px;transform:translate(-8px,-12px)">${emoji}</div>`;
  return L.divIcon({html: html, className: '', iconSize: [20,20]});
}

async function loadMarkers(){
  layer.clearLayers();

  const params = new URLSearchParams();
  params.set("days", String(DAYS));
  if(ACTIVE_BBOX){
    // bbox format: minLng,minLat,maxLng,maxLat
    params.set("bbox", ACTIVE_BBOX.join(","));
  }

  const url = `/reports/api/list/?` + params.toString();
  const res = await fetch(url);
  const data = await res.json();

  document.getElementById("stat").innerText =
    `표시중: ${data.count}건 (최근 ${DAYS}일)` + (ACTIVE_BBOX ? " · 지역 필터 ON" : " · 전체");

  data.items.forEach(item => {
    const m = L.marker([item.lat, item.lng], {icon: iconFor(item)}).addTo(layer);
    const html = `
      <div style="max-width:260px">
        <div><b>${item.title}</b></div>
        <div style="font-size:12px;opacity:.85;margin-top:4px">${item.summary}</div>
        <div style="margin-top:8px"><a href="${item.detail_url}">상세 보기 →</a></div>
      </div>`;
    m.bindPopup(html);
  });
}

function setDays(d){
  DAYS = d;
  loadMarkers();
}

// ===== Sidebar drilldown =====
function initCityOptions(){
  const selCity = document.getElementById("selCity");
  selCity.innerHTML = "";
  const keys = Object.keys(REGION_TREE);
  keys.forEach(k => {
    const opt = document.createElement("option");
    opt.value = k;
    opt.textContent = REGION_TREE[k].name;
    selCity.appendChild(opt);
  });
  onCityChange();
}

function onCityChange(){
  const cityKey = document.getElementById("selCity").value;
  const selArea = document.getElementById("selArea");
  selArea.innerHTML = "";

  const areas = REGION_TREE[cityKey].areas || {};
  // first option: whole city
  const optAll = document.createElement("option");
  optAll.value = "__all__";
  optAll.textContent = `${REGION_TREE[cityKey].name} 전체`;
  selArea.appendChild(optAll);

  Object.keys(areas).forEach(aKey => {
    const opt = document.createElement("option");
    opt.value = aKey;
    opt.textContent = areas[aKey].name;
    selArea.appendChild(opt);
  });
}

function applyRegion(){
  const cityKey = document.getElementById("selCity").value;
  const areaKey = document.getElementById("selArea").value;

  const city = REGION_TREE[cityKey];
  let label = city.name;

  if(areaKey && areaKey !== "__all__"){
    const area = city.areas[areaKey];
    label = `${city.name} · ${area.name}`;
    map.setView(area.center, area.zoom, {animate:true});
    ACTIVE_BBOX = area.bbox;
  }else{
    map.setView(city.center, city.zoom, {animate:true});
    ACTIVE_BBOX = city.bbox;
  }

  document.getElementById("regionLabel").innerText = label;
  loadMarkers();
}

function resetRegion(){
  ACTIVE_BBOX = null;
  document.getElementById("regionLabel").innerText = "전체";
  map.setView([37.5665, 126.9780], 12, {animate:true});
  loadMarkers();
}

// init
initCityOptions();
loadMarkers();
</script>
{% endblock %}
