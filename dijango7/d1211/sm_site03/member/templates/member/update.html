<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원정보 수정</title>
</head>
<body>
    <h2>회원정보 수정</h2>
    
    <form action="{% url 'member:update' member.id %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label>아이디</label>
        <input type='text' name='id' value="{{member.id}}" readonly><br>
        <label>비밀번호</label>
        <input type='text' name='pw' value="{{member.pw}}"><br>
        <label>이름</label>
        <input type='text' name='name' value="{{member.name}}"><br>
        <label>전화번호</label>
        <input type='text' name='phone' value="{{member.phone}}"><br>
        <label>성별</label><br>
        <input type='radio' name='gender' id='남자' value="남자" {% if member.gender == '남자' %}checked{% endif %}>
        <label for='남자'>남자</label>
        <input type='radio' name='gender' id='여자' value="여자" {% if member.gender == '여자' %}checked{% endif %}>
        <label for='여자'>여자</label>
        <br>
        <label>취미</label><br>
        {% with hobby_list=member.hobby|split:',' %}
        <input type='checkbox' name='hobby' id='게임' value="게임" {% if '게임' in hobby_list %}checked{% endif %}>
        <label for='게임'>게임</label>
        <input type='checkbox' name='hobby' id='골프' value="골프" {% if '골프' in hobby_list %}checked{% endif %}>
        <label for='골프'>골프</label>
        <input type='checkbox' name='hobby' id='수영' value="수영" {% if '수영' in hobby_list %}checked{% endif %}>
        <label for='수영'>수영</label>
        <input type='checkbox' name='hobby' id='조깅' value="조깅" {% if '조깅' in hobby_list %}checked{% endif %}>
        <label for='조깅'>조깅</label>
        <input type='checkbox' name='hobby' id='독서' value="독서" {% if '독서' in hobby_list %}checked{% endif %}>
        <label for='독서'>독서</label>
        {% endwith %}
        <br>
        <label>현재 이미지</label><br>
        {% if member.image %}
            <img src="{{member.image.url}}" style="width:100px; height:100px;"><br>
        {% else %}
            등록된 이미지가 없습니다.<br>
        {% endif %}
        <label>새 이미지</label>
        <input type='file' name='image' accept="image/*"><br>
        <br>

        <input type='submit' value="수정완료">
        <a href="{% url 'member:list' %}"><input type='button' value="목록으로"></a>
    </form>
    
    <ul>
        <li><a href='/'>메인페이지 이동</a></li>
    </ul>
</body>
</html>
