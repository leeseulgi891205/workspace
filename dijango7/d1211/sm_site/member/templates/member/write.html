<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원등록</title>
    <style>
        .form-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        fieldset {
            margin-bottom: 20px;
            padding: 15px;
        }
        label {
            display: inline-block;
            width: 100px;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="password"], input[type="email"] {
            padding: 5px;
            width: 300px;
        }
        input[type="submit"] {
            padding: 10px 30px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>회원등록페이지</h2>
        <form action="{% url 'member:write' %}" method="post">
            {% csrf_token %}
            <fieldset>
                <legend>기본 정보</legend>
                <label>아이디:</label>
                <input type="text" name="user_id" required><br>
                <label>비밀번호:</label>
                <input type="password" name="password" required><br>
                <label>이름:</label>
                <input type="text" name="name" required><br>
            </fieldset>
            <br>
            <fieldset>
                <legend>연락처 정보</legend>
                <label>전화번호:</label>
                <input type="text" name="phone" placeholder="010-0000-0000" required><br>
            </fieldset>
            <br>
            <fieldset>
                <legend>개인 정보</legend>
                <label>성별:</label>
                <input type="radio" name="gender" value="남자" id="male" checked>
                <label for="male" style="width: auto;">남자</label>
                <input type="radio" name="gender" value="여자" id="female">
                <label for="female" style="width: auto;">여자</label><br><br>
                <label>취미:</label>
                <input type="text" name="hobby" value="게임"><br>
            </fieldset>
            <br>
            <input type="submit" value="회원등록">
        </form>
        <br>
        <a href="{% url 'member:list' %}">회원리스트</a> | 
        <a href="{% url 'home_index' %}">홈으로</a>
    </div>
</body>
</html>
