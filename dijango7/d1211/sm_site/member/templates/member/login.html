<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

    </style>
</head>
<body>
    <div class="login-container">
        <h2>로그인</h2>
        <form action="{% url 'member:login' %}" method="post">
            {% csrf_token %}
            <label>아이디:</label>
            <input type="text" name="user_id" required>
            
            <label>비밀번호:</label>
            <input type="password" name="password" required>
            
            <button type="submit">로그인</button>
        </form>
        <br>
        <a href="{% url 'member:write' %}">회원가입</a> | 
        <a href="{% url 'home_index' %}">메인페이지</a>
    </div>
</body>
</html>
