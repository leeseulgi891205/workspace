<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 상세정보</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            width: 30%;
        }
        .student-image {
            max-width: 300px;
            max-height: 400px;
            display: block;
            margin: 20px auto;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .button-group {
            text-align: center;
            margin-top: 20px;
        }
        .button-group a {
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <h2>학생 상세정보</h2>
    
    {% if student.image %}
    <img src="{{ student.image.url }}" alt="{{ student.name }}" class="student-image">
    {% endif %}
    
    <table>
        <tr>
            <th>번호</th>
            <td>{{ student.id }}</td>
        </tr>
        <tr>
            <th>이름</th>
            <td>{{ student.name }}</td>
        </tr>
        <tr>
            <th>전공</th>
            <td>{{ student.major }}</td>
        </tr>
        <tr>
            <th>나이</th>
            <td>{{ student.age }}</td>
        </tr>
        <tr>
            <th>학년</th>
            <td>{{ student.grade }}</td>
        </tr>
        <tr>
            <th>성별</th>
            <td>{{ student.gender }}</td>
        </tr>
        <tr>
            <th>주소</th>
            <td>{{ student.address }}</td>
        </tr>
        <tr>
            <th>취미</th>
            <td>{{ student.hobby }}</td>
        </tr>
        {% if student.image %}
        <tr>
            <th>사진</th>
            <td>등록됨</td>
        </tr>
        {% endif %}
    </table>
    
    <div class="button-group">
        <a href="/student/update/{{ student.id }}/">수정</a>
        <a href="/student/delete/{{ student.id }}/" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</a>
        <a href="/student/list/">목록으로</a>
        <a href="/student/">메인으로</a>
    </div>
</body>
</html>
