<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 정보 수정</title>
</head>
<body>
    <h2>학생 정보 수정</h2>
    
    <form method="post" action="/student/update_process/{{ student.id }}/">
        {% csrf_token %}
        
        <div>
            <label for="name">이름:</label>
            <input type="text" id="name" name="name" value="{{ student.name }}" required>
        </div>
        
        <div>
            <label for="major">전공:</label>
            <input type="text" id="major" name="major" value="{{ student.major }}" required>
        </div>
        
        <div>
            <label for="age">나이:</label>
            <input type="number" id="age" name="age" value="{{ student.age }}" required>
        </div>
        
        <div>
            <label for="grade">학년:</label>
            <input type="number" id="grade" name="grade" value="{{ student.grade }}" required>
        </div>
        
        
        <div>
            <label for="address">주소:</label>
            <input type="text" id="address" name="address" value="{{ student.address }}">
        </div>
        
        <div>
            <label for="hobby">취미:</label>
            <input type="text" id="hobby" name="hobby" value="{{ student.hobby }}">
        </div>

        <div>
            <label>성별:</label>
            <input type="radio" id="male" name="gender" value="남자" {% if student.gender == "남자" %}checked{% endif %} required>
            <label for="male">남자</label>
            <input type="radio" id="female" name="gender" value="여자" {% if student.gender == "여자" %}checked{% endif %} required>
            <label for="female">여자</label>
        </div>
        
        <div>
            <button type="submit" onclick="return confirm('수정할꺼에유?');">수정</button>
            <a href="/student/view/{{ student.id }}/" onclick="return confirm('취소할꺼에유?');">취소</a>
        </div>
    </form>
</body>
</html>
