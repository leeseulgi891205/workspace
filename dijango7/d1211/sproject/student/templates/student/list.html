<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 목록</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h2>학생 목록</h2>
    
    <a href="/student/write/">학생 등록</a>
    <a href="/student/">메인으로</a>
    
    <table>
        <thead>
            <tr>
                <th>번호</th>
                <th>이름</th>
                <th>전공</th>
                <th>나이</th>
                <th>학년</th>
                <th>성별</th>
                <th>주소</th>
                <th>취미</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.id }}</td>
                <td><a href="/student/view/{{ student.id }}/">{{ student.name }}</a></td>
                <td>{{ student.major }}</td>
                <td>{{ student.age }}</td>
                <td>{{ student.grade }}</td>
                <td>{{ student.gender }}</td>
                <td>{{ student.address }}</td>
                <td>{{ student.hobby }}</td>
                <td>
                    <a href="/student/update/{{ student.id }}/">수정</a>
                    <a href="/student/delete/{{ student.id }}/" onclick="return confirm('삭제하시겠습니까?')">삭제</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="9">등록된 학생이 없습니다.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
