<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성적 리스트</title>
</head>
<body>
    <h2>학생 성적 리스트</h2>

    <table border="1">
        <tr>
            <th>번호</th>
            <th>이름</th>
            <th>국어</th>
            <th>영어</th>
            <th>수학</th>
            <th>총점</th>
            <th>평균</th>
        </tr>

        <!-- list 데이터가 있을 때 -->
        {% if list %}
            {% for s in list %}
            <tr>
                <td>{{ s.sno }}</td>
                <td>{{ s.name }}</td>
                <td>{{ s.kor }}</td>
                <td>{{ s.eng }}</td>
                <td>{{ s.math }}</td>
                <td>{{ s.total }}</td>
                <!-- 평균을 소수점 둘째 자리까지만 보고 싶으면 |floatformat:"2" 사용 -->
                <td>{{ s.avg|floatformat:"2" }}</td>
            </tr>
            {% endfor %}
        {% else %}
            <tr>
                <td colspan="7">입력된 성적이 없습니다.</td>
            </tr>
        {% endif %}
    </table>

    <br>
    <a href="{% url 'stuscore:write' %}">성적 등록</a> |
    <a href="/">메인페이지</a>
</body>
</html>
