<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생 상세보기</title>
</head>
<body>
    <h2>학생 상세보기</h2>

    <!-- student 객체 안의 필드를 하나씩 출력 -->
    <table border="1">
        <tr>
            <th>번호</th>
            <td>{{ student.sno }}</td>
        </tr>
        <tr>
            <th>이름</th>
            <td>{{ student.name }}</td>
        </tr>
        <tr>
            <th>나이</th>
            <td>{{ student.age }}</td>
        </tr>
        <tr>
            <th>학년</th>
            <td>{{ student.grade }}</td>
        </tr>
        <tr>
            <th>성별</th>
            <td>{{ student.gender }}</td>
        </tr>
        <tr>
            <th>취미</th>
            <td>{{ student.hobby }}</td>
        </tr>
    </table>

    <br>
    <a href="{% url 'student:list' %}">리스트로</a> |
    <a href="{% url 'student:delete' student.sno %}"
       onclick="return confirm('정말 삭제할까요?');">
        삭제
    </a> |
    <a href="/">메인페이지</a>
</body>
</html>
