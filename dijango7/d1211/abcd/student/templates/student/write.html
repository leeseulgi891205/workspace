<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생 등록</title>
</head>
<body>
    <h2>학생 등록</h2>

    <!-- 
        form : 입력한 내용을 서버로 보내는 태그
        action : 어디로 보낼지 (장고 URL 이름 사용)
        method="post" : POST 방식으로 전송(주소창에 안 보이게)
    -->
    <form action="{% url 'student:write' %}" method="post">
        <!-- CSRF 토큰: 장고에서 POST 요청을 보낼 때 보안상 꼭 필요한 값 -->
        {% csrf_token %}

        <label>이름</label>
        <input type="text" name="name"><br>

        <label>나이</label>
        <input type="text" name="age"><br>

        <label>학년</label>
        <input type="text" name="grade"><br>

        <label>성별</label><br>
        <!-- 같은 name="gender" 인 radio 둘 중 하나만 선택 가능 -->
        <input type="radio" name="gender" id="male" value="남자">
        <label for="male">남자</label>

        <input type="radio" name="gender" id="female" value="여자">
        <label for="female">여자</label>
        <br><br>

        <label>취미</label><br>
        <!-- checkbox : 여러 개 선택 가능 / name="hobby"를 동일하게 -->
        <input type="checkbox" name="hobby" id="game" value="게임">
        <label for="game">게임</label>

        <input type="checkbox" name="hobby" id="golf" value="골프">
        <label for="golf">골프</label>

        <input type="checkbox" name="hobby" id="swim" value="수영">
        <label for="swim">수영</label>

        <input type="checkbox" name="hobby" id="jog" value="조깅">
        <label for="jog">조깅</label>

        <input type="checkbox" name="hobby" id="book" value="독서">
        <label for="book">독서</label>

        <br><br>

        <!-- 실제로 서버로 전송하는 버튼 -->
        <input type="submit" value="학생 등록">
    </form>

    <br>
    <a href="/">메인페이지로</a>
</body>
</html>
