<!--
═══════════════════════════════════════════════════════════════════════
flea_write.html - 벼룩시장 글쓰기
═══════════════════════════════════════════════════════════════════════
26-01-06 표준화: 요리레시피 스타일로 리뉴얼
기능: 상품 등록 (이미지 업로드)
-->
{% extends 'base.html' %}

{% block content %}
<style>
.flea-write-container {
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
}

.flea-write-header {
    border-bottom: 2px solid #ff6b6b;
    padding-bottom: 15px;
    margin-bottom: 30px;
}

.flea-write-title {
    font-size: 28px;
    font-weight: 700;
    color: #333;
}

.form-group {
    margin-bottom: 25px;
}

.form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 8px;
    color: #333;
    font-size: 14px;
}

.form-group input[type="text"],
.form-group input[type="number"],
.form-group textarea {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    box-sizing: border-box;
}

.form-group input[type="text"]:focus,
.form-group input[type="number"]:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #ff6b6b;
    box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
}

.form-group textarea {
    min-height: 180px;
    resize: vertical;
}

.upload-area {
    border: 2px dashed #ddd;
    border-radius: 8px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: #f9f9f9;
}

.upload-area:hover {
    border-color: #ff6b6b;
    background: #fff5f5;
}

.upload-area.dragover {
    border-color: #ff6b6b;
    background: #fff5f5;
}

.upload-icon {
    font-size: 48px;
    margin-bottom: 12px;
}

.upload-text {
    font-size: 14px;
    color: #666;
    margin-bottom: 8px;
}

.upload-hint {
    font-size: 12px;
    color: #999;
}

#id_image {
    display: none;
}

.image-preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-top: 15px;
}

.image-preview-item {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    background: #f0f0f0;
    aspect-ratio: 1;
}

.image-preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.image-remove-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #ff6b6b;
    color: white;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease;
}

.image-remove-btn:hover {
    background: #ff5252;
}

.form-buttons {
    display: flex;
    gap: 10px;
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #eee;
}

.btn-submit {
    flex: 1;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-primary {
    background: #ff6b6b;
    color: white;
}

.btn-primary:hover {
    background: #ff5252;
}

.btn-secondary {
    background: #6c757d;
    color: white;
}

.btn-secondary:hover {
    background: #5a6268;
}
</style>

<div class="flea-write-container">
    <div class="flea-write-header">
        <h1 class="flea-write-title">🛒 {% if item %}상품 정보 수정{% else %}상품 등록{% endif %}</h1>
    </div>

    <form method="post" enctype="multipart/form-data" id="fleaForm">
        {% csrf_token %}

        <!-- 제목 -->
        <div class="form-group">
            <label for="id_title">상품명</label>
            {{ form.title }}
        </div>

        <!-- 가격 -->
        <div class="form-group">
            <label for="id_price">가격(원)</label>
            {{ form.price }}
        </div>

        <!-- 내용 -->
        <div class="form-group">
            <label for="id_description">상품 설명</label>
            {{ form.description }}
        </div>

        <!-- 이미지 업로드 -->
        <div class="form-group">
            <label>상품 이미지</label>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📷</div>
                <div class="upload-text">클릭 또는 드래그해서 이미지를 업로드하세요</div>
                <div class="upload-hint">JPG, PNG (최대 5MB)</div>
            </div>
            {{ form.image }}
            
            <!-- 기존 이미지 표시 (수정시) -->
            <div class="image-preview-grid" id="imagePreviewGrid">
                {% if item.image %}
                <div class="image-preview-item">
                    <img src="{{ item.image.url }}" alt="현재 이미지">
                </div>
                {% endif %}
            </div>
        </div>

        <!-- 버튼 -->
        <div class="form-buttons">
            <button type="button" class="btn-submit btn-secondary" onclick="location.href='{% url 'board:flea_list' %}'" >취소</button>
            <button type="submit" class="btn-submit btn-primary">{% if item %}수정 완료{% else %}상품 등록{% endif %}</button>
        </div>
    </form>
</div>

<script>
const uploadArea = document.getElementById('uploadArea');
const imageInput = document.getElementById('id_image');
const previewGrid = document.getElementById('imagePreviewGrid');
let selectedFiles = [];

// 업로드 영역 클릭
uploadArea.addEventListener('click', () => imageInput.click());

// 파일 선택
imageInput.addEventListener('change', handleFiles);

// 드래그 & 드롭
uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const files = e.dataTransfer.files;
    imageInput.files = files;
    handleFiles({ target: { files } });
});

function handleFiles(event) {
    const files = Array.from(event.target.files);
    selectedFiles = [];
    previewGrid.innerHTML = '';
    
    files.forEach((file, idx) => {
        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.createElement('div');
                preview.className = 'image-preview-item';
                preview.innerHTML = `
                    <img src="${e.target.result}" alt="미리보기">
                    <button type="button" class="image-remove-btn" data-idx="${idx}">✕</button>
                `;
                previewGrid.appendChild(preview);
                
                preview.querySelector('.image-remove-btn').addEventListener('click', () => {
                    selectedFiles.splice(idx, 1);
                    preview.remove();
                    updateFileInput();
                });
            };
            reader.readAsDataURL(file);
            selectedFiles.push(file);
        }
    });
    updateFileInput();
}

function updateFileInput() {
    const dataTransfer = new DataTransfer();
    selectedFiles.forEach(file => dataTransfer.items.add(file));
    imageInput.files = dataTransfer.files;
}
</script>
{% endblock %}
