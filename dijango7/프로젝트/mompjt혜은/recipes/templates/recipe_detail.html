{% extends 'base.html' %}
{% load static %}
{% block content %}




<div class="recipe-steps">
    {% for step in steps %}
    <div class="step" style="display: flex; gap: 20px; margin-bottom: 40px; align-items: flex-start;">
        <div class="step-image" style="flex: 0 0 45%; min-width: 0;">
            {% if step.image %}
                <img src="{{ step.image.url }}" alt="step {{ forloop.counter }}" style="width: 100%; height: auto; display: block; border-radius: 8px; object-fit: cover;">
            {% else %}
                <img src="{% static 'images/placeholder.png' %}" alt="no image" style="width: 100%; height: auto; display: block; border-radius: 8px; object-fit: cover;">
            {% endif %}
        </div>
        <div class="step-desc" style="flex: 1; padding-top: 10px;">
            <h3 style="margin-top: 0; color: #333;">Step {{ step.order }}</h3>
            <p style="line-height: 1.6; color: #666;">{{ step.description|linebreaksbr }}</p>
        </div>
    </div>
    {% endfor %}
</div>


{% endblock %}
