{% extends 'base.html' %}

{% block content %}
<div class="login-container">
    <h2>반려동물 게시판 글 수정 🐾</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <!-- 제목 -->
        <div class="form-group">
            <label for="id_title">제목</label>
            <input type="text"
                   name="title"
                   id="id_title"
                   value="{{ post.title }}"
                   required
                   placeholder="제목을 입력하세요">
        </div>

        <!-- 내용 -->
        <div class="form-group">
            <label for="id_content">내용</label>
            <textarea name="content"
                      id="id_content"
                      required
                      placeholder="반려동물과 관련된 이야기를 수정해 주세요 🐶🐱"
                      style="min-height: 250px; resize: vertical;">{{ post.content }}</textarea>
        </div>

        <!-- 현재 이미지 (있을 때만 표시) -->
        {% if post.image %}
        <div class="form-group">
            <label>현재 이미지</label>
            <img src="{{ post.image.url }}"
                 style="max-width:200px; display:block; margin-top:10px; border-radius:10px;">
        </div>
        {% endif %}

        <!-- 이미지 교체 -->
        <div class="form-group">
            <label for="id_image">이미지 변경 (선택)</label>
            <input type="file"
                   name="image"
                   id="id_image"
                   accept="image/*">
        </div>

        <!-- 수정 버튼 -->
        <button type="submit" class="btn-login-submit">
            수정완료
        </button>
    </form>

    <div class="login-links">
        <a href="{% url 'board:pet_detail' post.id %}">취소</a>
    </div>
</div>
{% endblock %}
