{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/board.css' %}">

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>게시판 | SafeMap</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
<div class="board-wrapper">
    <div class="board-header">
        <h1>게시판</h1>
        <p>우리 동네 사건·사고 공유 공간</p>
    </div>
    <div class="board-card">
        <table class="board-table">
            <thead>
                <tr>
                    <th>No</th>
                    <th>제목</th>
                    <th>작성일</th>
                </tr>
            </thead>

            <tbody>
                {% for board in boards %}
                <tr>
                    <td>{{ board.id }}</td>
                    <td class="title">{{ board.title }}</td>
                    <td>{{ board.created_at|date:"Y-m-d" }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="empty">게시글이 없습니다.</td>
                </tr>
                {% endfor %}
            </tbody>
            
        </table>
    </div>
</div>
</body>
</html>
{% endblock %}
