{% extends "base.html" %}
{% block title %}SafeMap | 로그인{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;margin:0 auto;">
  <h2 style="margin:0 0 6px;">로그인</h2>
  <div class="muted" style="margin-bottom:12px;">로그인하면 마이페이지+제보 등록 가능.</div>

  <form class="form" method="post">
    {% csrf_token %}
    <label>아이디</label>{{ form.username }}
    <label>비밀번호</label>{{ form.password }}
    <button class="btn" type="submit">로그인</button>
  </form>
</div>
{% endblock %}
