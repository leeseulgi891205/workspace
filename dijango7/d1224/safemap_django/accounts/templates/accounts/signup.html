{% extends "base.html" %}
{% block title %}SafeMap | 회원가입{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;margin:0 auto;">
  <h2 style="margin:0 0 6px;">회원가입 (민혁)</h2>
  <div class="muted" style="margin-bottom:12px;">3분 컷. 가입하면 제보/요약/지도 풀코스.</div>

  <form class="form" method="post">
    {% csrf_token %}
    <label>아이디</label>{{ form.username }}
    <label>이메일</label>{{ form.email }}
    <label>비밀번호</label>{{ form.password1 }}
    <label>비밀번호 확인</label>{{ form.password2 }}
    <button class="btn" type="submit">가입하기</button>
  </form>
</div>
{% endblock %}
