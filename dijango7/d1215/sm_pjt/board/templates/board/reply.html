<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VLAST Shop - 답변쓰기</title>
  <script>
    if('{{request.session.session_id}}' == '') {
      alert('로그인을 하셔야 답변쓰기가 가능합니다.');
      location.href = '/member/login/';
    }
  </script>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: #fff;
      color: #1a1a1a;
    }

    /* Header */
    .header {
      width: 100%;
      height: 60px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
      border-bottom: 1px solid #f0f0f0;
    }
    .top-menu {
      display: flex;
      gap: 15px;
      font-size: 13px;
      color: #636363;
      margin-right: 20px;
    }
    .top-menu a {
      text-decoration: none;
      color: #636363;
    }
    .top-menu a:hover {
      color: #035fe0;
    }

    .write-container {
      max-width: 800px;
      margin: 80px auto;
      padding: 0 20px;
      box-sizing: border-box;
    }
    .write-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      text-align: center;
    }
    .original-post {
      background-color: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 15px;
      margin-bottom: 30px;
    }
    .original-post .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }
    .original-post .content {
      font-size: 14px;
      color: #333;
      margin-bottom: 10px;
    }
    .original-post .title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 10px;
    }

    form.write-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .write-form input[type="text"],
    .write-form textarea {
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      width: 100%;
    }

    .write-form textarea {
      resize: vertical;
      min-height: 200px;
    }

    .write-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
    }

    .write-buttons button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      color: white;
      background-color: #035fe0;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .write-buttons button:hover {
      background-color: #0046b3;
    }

    .write-buttons .cancel {
      background-color: #6c757d;
    }

    .write-buttons .cancel:hover {
      background-color: #5a6268;
    }

    footer {
      border-top: 1px solid #ccc;
      padding: 30px;
      text-align: center;
      font-size: 13px;
      color: #A0A0A0;
    }
  </style>
  <script>
    if('{{flag}}' == '1') {
      alert('답변을 등록합니다.');
      location.href = '/board/list/';
    }
  </script>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="top-menu">
      <a href="#">회원가입</a> |
      <a href="#">로그인</a> |
      <a href="#">주문조회</a> |
      <a href="#">최근본상품</a>
    </div>
  </div>

  <!-- 답변쓰기 폼 -->
  <div class="write-container">
    <div class="write-title">답변 작성</div>
    
    <!-- 원본 게시글 정보 -->
    <div class="original-post">
      <div class="label">원본 게시글</div>
      <div class="title">{{ board.btitle }}</div>
      <div class="content">{{ board.bcontent|truncatewords:30 }}</div>
      <div class="label">작성자: {{ board.member.id }} | 작성일: {{ board.bdate|date:"Y-m-d H:i" }}</div>
    </div>

    <form class="write-form" id="replyForm" action="{% url 'board:reply' board.bno %}" method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <input type="text" name='id' id="writer" placeholder="작성자" maxlength="20" value='{{request.session.session_id}}' disabled />
      <input type="text" name='btitle' id="title" placeholder="제목" maxlength="100" value="Re: {{ board.btitle }}" required />
      <textarea id="content" name='bcontent' placeholder="답변 내용을 입력하세요." maxlength="2000" required></textarea>
      <input type="file" name="bfile" id="bfile" accept="image/*" />

      <div class="write-buttons">
        <button type="submit">답변 등록</button>
        <button type="button" class="cancel" onclick="history.back()">취소</button>
      </div>
    </form>
  </div>

  <!-- Footer -->
  <footer>
    Copyright © VLAST Shop. All rights reserved.
  </footer>

</body>
</html>
