{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VLAST Shop - 게시글 수정</title>
  <script>
    {% if update_state == "1" %}
      alert('게시글이 수정되었습니다.');
      location.href = '{% url "board:view" board.bno %}';
    {% endif %}
  </script>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: #fff;
      color: #1a1a1a;
    }

    .header {
      width: 100%;
      height: 60px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
      border-bottom: 1px solid #f0f0f0;
    }
    .top-menu {
      display: flex;
      gap: 15px;
      font-size: 13px;
      color: #636363;
      margin-right: 20px;
    }
    .top-menu a {
      text-decoration: none;
      color: #636363;
    }

    .write-container {
      max-width: 800px;
      margin: 80px auto;
      padding: 0 20px;
      box-sizing: border-box;
    }
    .write-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 30px;
      text-align: center;
    }

    form.write-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .write-form input[type="text"],
    .write-form textarea {
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      width: 100%;
    }

    .write-form textarea {
      resize: vertical;
      min-height: 200px;
    }

    .write-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
    }

    .write-buttons button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      color: white;
      background-color: #035fe0;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .write-buttons button:hover {
      background-color: #0046b3;
    }

    .write-buttons button.cancel {
      background-color: #999;
    }

    .write-buttons button.cancel:hover {
      background-color: #666;
    }

    footer {
      margin-top: 80px;
      border-top: 1px solid #ccc;
      padding: 30px;
      text-align: center;
      font-size: 13px;
      color: #A0A0A0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="top-menu">
      <a href="#">회원가입</a> |
      <a href="#">로그인</a> |
      <a href="#">주문조회</a> |
      <a href="#">최근본상품</a>
    </div>
  </div>

  <div class="write-container">
    <div class="write-title">게시글 수정</div>
    <form method="post" action="{% url 'board:update' board.bno %}" class="write-form" name="frm">
      {% csrf_token %}
      <input type="text" name="btitle" placeholder="제목을 입력하세요" value="{{board.btitle}}" required />
      <textarea name="bcontent" placeholder="내용을 입력하세요" required>{{board.bcontent}}</textarea>
      <div class="write-buttons">
        <button type="submit">수정하기</button>
        <button type="button" class="cancel" onclick="location.href='{% url 'board:view' board.bno %}'">취소</button>
      </div>
    </form>
  </div>

  <footer>
    Copyright © VLAST Shop. All rights reserved.
  </footer>
</body>
</html>
