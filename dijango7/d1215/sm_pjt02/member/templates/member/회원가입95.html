<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원 가입</title>
  <style>
    @font-face {
        font-family: 'Pretendard';
        src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
        font-weight: 400;
        font-display: swap;
    }
    @font-face {
        font-family: 'Pretendard';
        src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Bold.woff') format('woff');
        font-weight: 700;
        font-display: swap;
    }
    * { font-family: 'Pretendard'; }
    ul, ol { list-style: none; padding: 0; margin: 0; }

    body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #1a1a1a;
    }

    /* Header (우측 상단 메뉴 + 아이콘) */
    .header {
      width: 100%;
      height: 60px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
      border-bottom: 1px solid #f0f0f0;
    }
    .top-menu {
      display: flex;
      gap: 15px;
      font-size: 13px;
      color: #636363;
      margin-right: 20px;
    }
    .top-menu a {
      text-decoration: none;
      color: #636363;
    }
    .top-menu a:hover {
      color: #035fe0;
    }
    .icons {
      display: flex;
      gap: 15px;
      font-size: 18px;
      cursor: pointer;
    }

    .container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    .title {
        margin: 0 auto;
        text-align: center;
        padding: 70px 0;
        font-size: 30px;
        font-weight: bold;
    }

    .orderStep {
        text-align: center;
        padding-bottom: 20px;
        margin-bottom: 10px;
        border-bottom: 1px solid #1a1a1a;
    }

    .orderStep ul {
        display: flex;
        justify-content: center;
        gap: 40px;
    }

    .orderStep li {
      display: inline-block;
      font-size: 14px;
    }

    /* 수정된 부분: 현재 단계 스타일 완전히 적용 */
    .orderStep li .current {
        color: #035fe0;
        font-weight: 700;
        font-size: 15px;
    }

    .form-box {
      margin: 0 auto;
      max-width: 720px;
      box-sizing: border-box;
      padding: 10px 30px;
    }

    .form-box table {
      width: 100%;
      border-collapse: collapse;
    }

    .form-box td {
      padding: 4px 0 12px;
      vertical-align: middle;
    }

    .form-box td:first-child {
      width: 140px;
      font-weight: 700;
      color: #1a1a1a;
    }

    input[type="text"], input[type="password"], input[type="email"], select {
      width: 100%;
      padding: 15px;
      font-size: 15px;
      height: 45px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      background: white;
    }

    input:focus, select:focus {
      outline: 1.5px solid #1a1a1a;
    }

    /* 아이디, 이메일, 인증번호 입력 + 버튼 */
    .id-check-box,
    .email-input,
    .code-input {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .id-check-box input,
    .email-input input,
    .code-input input {
      flex: 1;
    }

    .id-check-box button,
    .email-input button,
    .code-input button {
      width: 110px;
      height: 45px;
      border: 1px solid #035fe0;
      background-color: #035fe0;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      flex-shrink: 0;
    }

    /* 휴대전화 입력칸 */
    .phone-input {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .phone-input select,
    .phone-input input {
      flex: 1;
      height: 45px;
      font-size: 15px;
      border: 1px solid #ccc;
      background: white;
      padding: 0 10px;
      box-sizing: border-box;
    }

    .phone-input span {
      width: 15px;
      text-align: center;
    }

    /* 하단 버튼 */
    .btn-box {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 50px 0; /* 버튼 위아래 여백 동일하게 */
      margin: 0;
    }

    .btn-box .btn {
      width: 160px;
      height: 50px;
      font-size: 15px;
      font-weight: 400;
      border: 1px solid #ccc;
      background-color: white;
      color: #1a1a1a;
      cursor: pointer;
      box-sizing: border-box;
      margin: 0;
    }

    .btn-box .btn.submit {
      background-color: #035fe0;
      border: 1px solid #035fe0;
      color: #fff;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .btn-box {
        flex-direction: column;
        gap: 10px;
      }
      .btn-box .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="top-menu">
      <a href="#">회원가입</a> |
      <a href="#">로그인</a> |
      <a href="#">주문조회</a> |
      <a href="#">최근본상품</a>
    </div>
    <div class="icons">
      <i class="fas fa-search"></i>
      <i class="fas fa-user"></i>
      <i class="fas fa-shopping-bag"></i>
    </div>
  </div>
  <div class="container">
    <div class="steps">
      <div class="title">회원가입</div>
      <div class="orderStep">
        <ul>
          <li>1. 약관동의</li>
          <li><span class="current">2. 정보입력</span></li>
          <li>3. 가입완료</li>
        </ul>
      </div>
    </div>

    <div class="form-box">
      <form method="post" action="{% url 'member:join' %}">
        {% csrf_token %}
      <table>
        <tr>
          <td>아이디 <span style="color:red">*</span></td>
          <td>
            <div class="id-check-box">
              <input type="text" id="userId" name="id" placeholder="영문소문자/숫자, 4~16자" pattern="[a-z0-9]{4,16}" title="영문 소문자/숫자 4~16자 입력 가능합니다" required>
              <button type="button" onclick="checkId()">중복확인</button>
            </div>
            <span id="idCheckMsg" style="font-size: 13px; margin-top: 5px; display: block;"></span>
          </td>
        </tr>
        <tr>
          <td>비밀번호 <span style="color:red">*</span></td>
          <td><input type="password" name="pw" placeholder="영문 대소문자/숫자/특수문자 중 2가지 이상 조합, 10자~16자" required></td>
        </tr>
        <tr>
          <td>비밀번호 확인 <span style="color:red">*</span></td>
          <td><input type="password" name="pw2" required></td>
        </tr>
        <tr>
          <td>이름 <span style="color:red">*</span></td>
          <td><input type="text" name="name" required></td>
        </tr>
        <tr>
          <td>휴대전화</td>
          <td>
            <input type="text" name="phone" placeholder="010-1234-5678">
          </td>
        </tr>
        <tr>
          <td>이메일</td>
          <td>
            <input type="email" name="email" placeholder="example@domain.com">
          </td>
        </tr>
        <tr>
          <td>성별</td>
          <td>
            <label><input type="radio" name="gender" value="남자" checked> 남자</label>
            <label><input type="radio" name="gender" value="여자"> 여자</label>
          </td>
        </tr>
        <tr>
          <td>취미</td>
          <td>
            <input type="text" name="hobby" placeholder="취미를 입력하세요">
          </td>
        </tr>
        <tr>
          <td>주소</td>
          <td>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
              <input type="text" id="post" name="post" placeholder="우편번호" readonly style="flex: 1;">
              <button type="button" onclick="execDaumPostcode()" style="width: 110px; height: 45px; border: 1px solid #035fe0; background-color: #035fe0; color: #fff; cursor: pointer; font-size: 15px; font-weight: 500;">우편번호 찾기</button>
            </div>
            <input type="text" id="address" name="address" placeholder="주소" readonly style="margin-bottom: 10px;">
            <input type="text" id="address_detail" name="address_detail" placeholder="상세주소">
          </td>
        </tr>
      </table>

    <div class="btn-box">
      <button type="button" class="btn cancel" onclick="history.back()">취소</button>
      <button type="submit" class="btn submit">확인</button>
    </div>
      </form>
    </div>
  </div>
  <footer></footer>
  
  <!-- Daum 우편번호 API -->
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script>
    // 아이디 중복확인
    let idChecked = false;
    
    function checkId() {
      const userId = document.getElementById('userId').value.trim();
      const msgElement = document.getElementById('idCheckMsg');
      
      if(!userId) {
        msgElement.style.color = 'red';
        msgElement.textContent = '아이디를 입력하세요.';
        return;
      }
      
      // 영문 소문자/숫자 검증
      const pattern = /^[a-z0-9]{4,16}$/;
      if(!pattern.test(userId)) {
        msgElement.style.color = 'red';
        msgElement.textContent = '영문 소문자/숫자 4~16자 입력 가능합니다.';
        return;
      }
      
      // AJAX 요청
      fetch('/member/check_id/?id=' + encodeURIComponent(userId))
        .then(response => response.json())
        .then(data => {
          if(data.result === 'available') {
            msgElement.style.color = 'green';
            msgElement.textContent = data.msg;
            idChecked = true;
          } else if(data.result === 'duplicate') {
            msgElement.style.color = 'red';
            msgElement.textContent = data.msg;
            idChecked = false;
          } else {
            msgElement.style.color = 'red';
            msgElement.textContent = data.msg;
            idChecked = false;
          }
        })
        .catch(error => {
          msgElement.style.color = 'red';
          msgElement.textContent = '오류가 발생했습니다.';
          idChecked = false;
        });
    }
    
    // 아이디 입력 변경 시 중복확인 초기화
    document.addEventListener('DOMContentLoaded', function() {
      const userIdInput = document.getElementById('userId');
      if(userIdInput) {
        userIdInput.addEventListener('input', function() {
          idChecked = false;
          document.getElementById('idCheckMsg').textContent = '';
        });
      }
      
      // 폼 제출 시 중복확인 체크
      const form = document.querySelector('form');
      if(form) {
        form.addEventListener('submit', function(e) {
          if(!idChecked) {
            e.preventDefault();
            alert('아이디 중복확인을 해주세요.');
            return false;
          }
        });
      }
    });
  </script>
  <script>
    function execDaumPostcode() {
      new daum.Postcode({
        oncomplete: function(data) {
          // 우편번호와 주소 정보를 해당 필드에 넣는다.
          document.getElementById('post').value = data.zonecode;
          
          var addr = ''; // 주소 변수
          
          // 사용자가 선택한 주소 타입에 따라 해당 주소 값을 가져온다.
          if (data.userSelectedType === 'R') { // 도로명 주소 선택
            addr = data.roadAddress;
          } else { // 지번 주소 선택
            addr = data.jibunAddress;
          }
          
          // 주소 정보를 해당 필드에 넣는다.
          document.getElementById('address').value = addr;
          // 상세주소 필드에 포커스를 이동한다.
          document.getElementById('address_detail').focus();
        }
      }).open();
    }
  </script>
</body>
</html>
