<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 완료</title>
  <style>
    @font-face {
        font-family: 'Pretendard';
        src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
        font-weight: 400;
        font-display: swap;
    }
    @font-face {
        font-family: 'Pretendard';
        src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Bold.woff') format('woff');
        font-weight: 700;
        font-display: swap;
    }
    * { font-family: 'Pretendard'; }
    ul, ol { list-style: none; padding: 0; margin: 0; }

    body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #1a1a1a;
    }

    .header {
      width: 100%;
      height: 60px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
      border-bottom: 1px solid #f0f0f0;
    }
    .top-menu {
      display: flex;
      gap: 15px;
      font-size: 13px;
      color: #636363;
      margin-right: 20px;
    }
    .top-menu a {
      text-decoration: none;
      color: #636363;
    }
    .top-menu a:hover {
      color: #035fe0;
    }

    .container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      box-sizing: border-box;
      text-align: center;
      padding: 100px 20px;
    }

    .title {
        font-size: 30px;
        font-weight: bold;
        margin-bottom: 30px;
    }

    .orderStep {
        padding-bottom: 20px;
        margin-bottom: 40px;
        border-bottom: 1px solid #1a1a1a;
    }

    .orderStep ul {
        display: flex;
        justify-content: center;
        gap: 40px;
    }

    .orderStep li {
      font-size: 14px;
    }

    .orderStep li .current {
        color: #035fe0;
        font-weight: 700;
        font-size: 15px;
    }

    .complete-box {
      padding: 60px 20px;
      background: #f8f9fa;
      border-radius: 10px;
      margin-bottom: 40px;
    }

    .complete-box h2 {
      font-size: 24px;
      color: #035fe0;
      margin-bottom: 20px;
    }

    .complete-box p {
      font-size: 16px;
      line-height: 1.6;
      color: #555;
    }

    .btn-box {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .btn {
      width: 160px;
      height: 50px;
      font-size: 15px;
      font-weight: 400;
      border: 1px solid #ccc;
      background-color: white;
      color: #1a1a1a;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn.submit {
      background-color: #035fe0;
      border: 1px solid #035fe0;
      color: #fff;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="top-menu">
      <a href="/member/join/">회원가입</a> |
      <a href="/member/login/">로그인</a> |
      <a href="#">주문조회</a> |
      <a href="#">최근본상품</a>
    </div>
  </div>
  
  <div class="container">
    <div class="title">회원가입</div>
    <div class="orderStep">
      <ul>
        <li>1. 약관동의</li>
        <li>2. 정보입력</li>
        <li><span class="current">3. 가입완료</span></li>
      </ul>
    </div>

    <div class="complete-box">
      <h2>🎉 회원가입이 완료되었습니다!</h2>
      <p>
        <strong>{{name}}</strong>님, 환영합니다!<br>
        회원가입이 성공적으로 완료되었습니다.<br>
        로그인 후 다양한 서비스를 이용하실 수 있습니다.
      </p>
    </div>

    <div class="btn-box">
      <a href="/" class="btn">메인으로</a>
      <a href="/member/login/" class="btn submit">로그인</a>
    </div>
  </div>
</body>
</html>
