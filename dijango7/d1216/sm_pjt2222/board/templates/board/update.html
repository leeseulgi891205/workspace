<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VLAST Shop - 글수정</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: #fff;
      color: #1a1a1a;
    }

    /* Header */
    .header {
      width: 100%;
      height: 60px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
      border-bottom: 1px solid #f0f0f0;
    }
    .top-menu {
      display: flex;
      gap: 15px;
      font-size: 13px;
      color: #636363;
      margin-right: 20px;
    }
    .top-menu a {
      text-decoration: none;
      color: #636363;
    }
    .top-menu a:hover {
      color: #035fe0;
    }

    .write-container {
      max-width: 800px;
      margin: 80px auto;
      padding: 0 20px;
      box-sizing: border-box;
    }
    .write-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 30px;
      text-align: center;
    }

    form.write-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .write-form input[type="text"],
    .write-form textarea {
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      width: 100%;
    }

    .write-form textarea {
      resize: vertical;
      min-height: 200px;
    }

    .write-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
    }

    .write-buttons button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      color: white;
      background-color: #035fe0;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .write-buttons button:hover {
      background-color: #0046b3;
    }

    .write-buttons .cancel {
      background-color: #6c757d;
    }

    .write-buttons .cancel:hover {
      background-color: #5a6268;
    }

    footer {
      border-top: 1px solid #ccc;
      padding: 30px;
      text-align: center;
      font-size: 13px;
      color: #A0A0A0;
    }

    .file-info {
      font-size: 13px;
      color: #666;
      margin-top: 5px;
    }
  </style>
  <script>
    if ('{{flag}}' == 'success') {
        alert('글이 성공적으로 수정되었습니다.');
    } else if ('{{flag}}' == 'error') {
        alert('글 수정에 실패했습니다. 다시 시도해주세요.');
    }
  </script>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="top-menu">
      <a href="#">회원가입</a> |
      <a href="#">로그인</a> |
      <a href="#">주문조회</a> |
      <a href="#">최근본상품</a>
    </div>
  </div>

  <!-- 글수정 폼 -->
  <div class="write-container">
    <div class="write-title">게시글 수정</div>
    <form class="write-form" name='frm' action='/board/update/{{board.bno}}/' method='post' enctype='multipart/form-data'>
      {% csrf_token %}
      <input type="text" name='id' value='{{board.member.name}}' disabled />
      <input type="text" name='btitle' id="title" placeholder="제목" maxlength="100" value="{{board.btitle}}" required />
      <textarea name='bcontent' id="content" placeholder="내용을 입력하세요." maxlength="2000" required>{{board.bcontent}}</textarea>
      
      {% if board.bfile %}
      <div class="file-info">파일첨부: {{board.bfile}}</div>
      {% endif %}
      <input type="file" name='bfile' onchange='readURL(this);' />
      <img id='preview' style='width:100px; {% if board.bfile %}display:block;{% else %}display:none;{% endif %}' 
           {% if board.bfile %}src='/media/{{board.bfile}}'{% endif %}>
      
      <div class="write-buttons">
        <button type="submit">수정</button>
        <button type="button" class="cancel" onclick="location.href='/board/view/{{board.bno}}/'">취소</button>
      </div>
    </form>
  </div>

  <!-- Footer -->
  <footer>
    Copyright © VLAST Shop. All rights reserved.
  </footer>

  <script>
    // 이미지 업로드시 이미지 미리보기 함수
    function readURL(input){
        // 파일첨부가 있으면
        if(input.files && input.files[0]){
            var reader = new FileReader();
            reader.onload = function(e){
                document.getElementById('preview').src = e.target.result;
                document.getElementById('preview').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }else{
            // 없을 경우 기존 이미지 유지
            {% if not board.bfile %}
            document.getElementById('preview').src = '';
            document.getElementById('preview').style.display = 'none';
            {% endif %}
        }
    }
  </script>
</body>
</html>
